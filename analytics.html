<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repfind — Analytics</title>
  <link rel="icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#1A1A1A;--bg-deep:#131313;--surface:#242424;--surface-2:#2E2E2E;--surface-hover:#343434;
      --border:#2A2A2A;--border-light:#383838;--text:#F5F5F5;--text-secondary:#C5C5C5;--text-muted:#888;
      --text-dim:#5A5A5A;--accent:#C84B2F;--accent-light:#E8624A;--green:#34D399;--yellow:#FBBF24;
      --blue:#60A5FA;--purple:#A78BFA;--radius:14px;--radius-xs:6px;
      --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    }
    html{-webkit-font-smoothing:antialiased}
    body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;letter-spacing:-0.011em}
    .header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);background:var(--bg-deep);position:sticky;top:0;z-index:100}
    .header-left{display:flex;align-items:center;gap:12px}
    .header-logo{font-size:20px;font-weight:800;letter-spacing:-0.03em}
    .header-logo span{color:var(--accent)}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .live-text{font-size:12px;font-weight:600;color:var(--text-muted)}
    .refresh-btn{background:var(--surface);border:1px solid var(--border-light);color:var(--text-secondary);padding:6px 14px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font)}
    .refresh-btn:hover{background:var(--surface-hover);color:var(--text)}
    .back-link{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s}
    .back-link:hover{color:var(--accent)}
    .container{max-width:1100px;margin:0 auto;padding:32px 24px 80px}
    .range-bar{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
    .range-btn{background:var(--surface);border:1px solid var(--border-light);color:var(--text-muted);padding:6px 16px;border-radius:var(--radius-xs);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font)}
    .range-btn:hover{background:var(--surface-hover);color:var(--text-secondary)}
    .range-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:36px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
    .stat-card.views::before{background:var(--blue)}
    .stat-card.searches::before{background:var(--accent)}
    .stat-card.clicks::before{background:var(--green)}
    .stat-card.events::before{background:var(--purple)}
    .stat-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
    .stat-value{font-size:32px;font-weight:800;letter-spacing:-0.03em;line-height:1.1}
    .stat-sub{font-size:12px;color:var(--text-dim);margin-top:6px}
    .section{margin-bottom:36px}
    .section-title{font-size:14px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
    .chart-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
    #activityChart{width:100%;height:240px;display:block}
    .chart-legend{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text-muted)}
    .legend-dot{width:10px;height:10px;border-radius:3px}
    .search-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .search-item{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .15s}
    .search-item:last-child{border-bottom:none}
    .search-item:hover{background:var(--surface-2)}
    .search-query{font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .search-meta{display:flex;align-items:center;gap:12px;flex-shrink:0}
    .search-count{font-size:12px;font-weight:600;color:var(--text-muted);background:var(--surface-2);padding:3px 10px;border-radius:100px}
    .search-time{font-size:12px;color:var(--text-dim);width:100px;text-align:right}
    .action-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:4px}
    .action-search{background:rgba(200,75,47,.15);color:var(--accent-light)}
    .action-fallback{background:rgba(251,191,36,.15);color:var(--yellow)}
    .action-clarify{background:rgba(96,165,250,.15);color:var(--blue)}
    .breakdown{display:flex;height:32px;border-radius:var(--radius-xs);overflow:hidden;margin-bottom:12px}
    .breakdown-segment{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.9);overflow:hidden;white-space:nowrap}
    .loading{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px}
    .loading-spinner{width:32px;height:32px;border:3px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}
    @media(max-width:640px){
      .container{padding:20px 16px 60px}
      .stats-grid{grid-template-columns:repeat(2,1fr);gap:12px}
      .stat-card{padding:16px}.stat-value{font-size:24px}
      .search-time{display:none}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="/" class="back-link">← repfind</a>
    <span class="header-logo"><span>rep</span>find<span style="color:var(--text-dim)"> / analytics</span></span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="live-dot"></div>
    <span class="live-text" id="lastUpdate">Loading…</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="container">
  <div class="range-bar">
    <button class="range-btn" data-range="1" onclick="setRange(1)">24h</button>
    <button class="range-btn" data-range="7" onclick="setRange(7)">7d</button>
    <button class="range-btn active" data-range="30" onclick="setRange(30)">30d</button>
    <button class="range-btn" data-range="0" onclick="setRange(0)">All</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card views">
      <div class="stat-label">Page Views</div>
      <div class="stat-value" id="statViews">—</div>
      <div class="stat-sub" id="statViewsSub">Visitors</div>
    </div>
    <div class="stat-card searches">
      <div class="stat-label">Searches</div>
      <div class="stat-value" id="statSearches">—</div>
      <div class="stat-sub" id="statSearchesSub">Product searches</div>
    </div>
    <div class="stat-card clicks">
      <div class="stat-label">Agent Clicks</div>
      <div class="stat-value" id="statClicks">—</div>
      <div class="stat-sub" id="statClicksSub">Click-throughs</div>
    </div>
    <div class="stat-card events">
      <div class="stat-label">Total Events</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub" id="statTotalSub">All actions</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Event Breakdown</div>
    <div class="breakdown" id="breakdownBar"></div>
    <div class="chart-legend" id="breakdownLegend"></div>
  </div>

  <div class="section">
    <div class="section-title">📈 Activity Over Time</div>
    <div class="chart-container">
      <canvas id="activityChart"></canvas>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Searches</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Page Views</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Clicks</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🔍 Recent Searches</div>
    <div class="search-list" id="searchList">
      <div class="loading"><div class="loading-spinner"></div>Loading…</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🔥 Top Searches</div>
    <div class="search-list" id="topSearchList">
      <div class="loading"><div class="loading-spinner"></div>Loading…</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xacehhtgvubcqdoltazg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1TNu5hqotJ7GGQXfjliivQ_ttK51EAA';
const client = window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentRange = 30;
let allData = [];

function setRange(days) {
  currentRange = days;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-range="' + days + '"]').classList.add('active');
  render();
}

async function loadData() {
  document.getElementById('lastUpdate').textContent = 'Loading…';
  let all = [];
  let offset = 0;
  const limit = 1000;
  while (true) {
    const { data, error } = await client.from('repfind_searches').select('*').order('created_at', { ascending: false }).range(offset, offset + limit - 1);
    if (error) { console.error(error); break; }
    if (!data || data.length === 0) break;
    all = all.concat(data);
    if (data.length < limit) break;
    offset += limit;
  }
  allData = all;
  document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  render();
}

function getFiltered() {
  if (currentRange === 0) return allData;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - currentRange);
  const cutoffStr = cutoff.toISOString();
  return allData.filter(r => r.created_at >= cutoffStr);
}

function render() {
  const data = getFiltered();

  const views = data.filter(r => r.action === 'page_view').length;
  const searches = data.filter(r => r.action === 'search' || r.action === 'search_fallback');
  const realSearchTerms = searches.filter(r => r.query && r.query.length > 2 && !r.query.startsWith('agent_'));
  const clicks = data.filter(r => r.query === 'agent_click' || (r.action === 'event' && r.query && r.query.includes('click')));
  const total = data.length;
  const uniqueUsers = new Set(data.filter(r => r.user_id).map(r => r.user_id)).size;

  document.getElementById('statViews').textContent = views.toLocaleString();
  document.getElementById('statViewsSub').textContent = uniqueUsers > 0 ? uniqueUsers + ' logged-in users' : 'Anonymous visitors';
  document.getElementById('statSearches').textContent = searches.length.toLocaleString();
  document.getElementById('statSearchesSub').textContent = realSearchTerms.length + ' with queries';
  document.getElementById('statClicks').textContent = clicks.length.toLocaleString();
  const ctr = searches.length > 0 ? ((clicks.length / searches.length) * 100).toFixed(1) : '0';
  document.getElementById('statClicksSub').textContent = ctr + '% click-through rate';
  document.getElementById('statTotal').textContent = total.toLocaleString();
  document.getElementById('statTotalSub').textContent = currentRange === 0 ? 'all time' : 'last ' + currentRange + 'd';

  // Breakdown
  const actions = {};
  data.forEach(r => { const a = r.action || 'none'; actions[a] = (actions[a] || 0) + 1; });
  renderBreakdown(actions, total);

  // Chart
  renderChart(data);

  // Recent searches
  const recent = data.filter(r => (r.action === 'search' || r.action === 'search_fallback' || r.action === 'clarify') && r.query && r.query.length > 1 && !r.query.startsWith('agent_')).slice(0, 15);
  renderSearchList('searchList', recent);

  // Top searches
  const searchCounts = {};
  realSearchTerms.forEach(r => {
    const q = r.query.toLowerCase().trim();
    if (q.length < 2) return;
    searchCounts[q] = (searchCounts[q] || 0) + 1;
  });
  const top = Object.entries(searchCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
  renderTopSearches('topSearchList', top);
}

const COLORS = { clarify: '#60A5FA', search: '#C84B2F', search_fallback: '#FBBF24', page_view: '#34D399', event: '#A78BFA', none: '#5A5A5A' };
const LABELS = { clarify: 'Chat', search: 'Search', search_fallback: 'Fallback', page_view: 'Views', event: 'Events', none: 'Other' };

function renderBreakdown(actions, total) {
  const bar = document.getElementById('breakdownBar');
  const legend = document.getElementById('breakdownLegend');
  bar.innerHTML = '';
  legend.innerHTML = '';
  const sorted = Object.entries(actions).sort((a, b) => b[1] - a[1]);
  sorted.forEach(([action, count]) => {
    const pct = total > 0 ? (count / total) * 100 : 0;
    if (pct < 0.5) return;
    const seg = document.createElement('div');
    seg.className = 'breakdown-segment';
    seg.style.background = COLORS[action] || '#5A5A5A';
    seg.style.flex = count;
    seg.title = (LABELS[action] || action) + ': ' + count + ' (' + pct.toFixed(1) + '%)';
    if (pct > 5) seg.textContent = count;
    bar.appendChild(seg);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<div class="legend-dot" style="background:' + (COLORS[action] || '#5A5A5A') + '"></div>' + (LABELS[action] || action) + ' (' + count + ')';
    legend.appendChild(item);
  });
}

function renderSearchList(id, searches) {
  const el = document.getElementById(id);
  if (searches.length === 0) { el.innerHTML = '<div class="empty">No searches yet</div>'; return; }
  el.innerHTML = searches.map(r => {
    const time = new Date(r.created_at + 'Z');
    const ago = timeAgo(time);
    const cls = r.action === 'search' ? 'action-search' : r.action === 'search_fallback' ? 'action-fallback' : 'action-clarify';
    const label = r.action === 'search_fallback' ? 'fallback' : r.action;
    return '<div class="search-item"><div class="search-query">' + escapeHtml(r.query) + '</div><div class="search-meta">' + (r.results_count > 0 ? '<span class="search-count">' + r.results_count + ' results</span>' : '') + '<span class="action-badge ' + cls + '">' + label + '</span><span class="search-time">' + ago + '</span></div></div>';
  }).join('');
}

function renderTopSearches(id, top) {
  const el = document.getElementById(id);
  if (top.length === 0) { el.innerHTML = '<div class="empty">Not enough data yet</div>'; return; }
  el.innerHTML = top.map(([q, c]) => '<div class="search-item"><div class="search-query">' + escapeHtml(q) + '</div><div class="search-meta"><span class="search-count">' + c + 'x</span></div></div>').join('');
}

function renderChart(data) {
  const canvas = document.getElementById('activityChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 240 * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 240;
  ctx.clearRect(0, 0, W, H);

  // Group by day
  const days = {};
  const now = new Date();
  const range = currentRange === 0 ? 30 : currentRange;
  for (let i = range - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    days[key] = { searches: 0, views: 0, clicks: 0 };
  }

  data.forEach(r => {
    const key = (r.created_at || '').slice(0, 10);
    if (!days[key]) return;
    if (r.action === 'search' || r.action === 'search_fallback') days[key].searches++;
    else if (r.action === 'page_view') days[key].views++;
    if (r.query === 'agent_click' || (r.action === 'event' && r.query && r.query.includes('click'))) days[key].clicks++;
  });

  const keys = Object.keys(days).sort();
  const padL = 40, padR = 16, padT = 16, padB = 28;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const maxVal = Math.max(1, ...keys.map(k => Math.max(days[k].searches, days[k].views, days[k].clicks)));
  const barW = chartW / keys.length;

  // Grid lines
  ctx.strokeStyle = '#2A2A2A';
  ctx.lineWidth = 1;
  ctx.font = '11px Inter, sans-serif';
  ctx.fillStyle = '#5A5A5A';
  for (let i = 0; i <= 4; i++) {
    const y = padT + (chartH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    const val = Math.round(maxVal - (maxVal / 4) * i);
    ctx.textAlign = 'right';
    ctx.fillText(val, padL - 6, y + 3);
  }

  // Bars
  keys.forEach((key, i) => {
    const d = days[key];
    const x = padL + barW * i;
    const groupW = barW * 0.7;
    const barGap = 2;
    const subBarW = (groupW - barGap * 2) / 3;

    const drawBar = (val, color, offset) => {
      const h = (val / maxVal) * chartH;
      const bx = x + (barW - groupW) / 2 + offset * subBarW;
      const by = padT + chartH - h;
      ctx.fillStyle = color;
      ctx.fillRect(bx, by, subBarW - 1, h);
    };

    drawBar(d.searches, '#C84B2F', 0);
    drawBar(d.views, '#60A5FA', 1);
    drawBar(d.clicks, '#34D399', 2);
  });

  // X labels (every Nth day)
  const labelStep = Math.ceil(keys.length / 7);
  ctx.textAlign = 'center';
  keys.forEach((key, i) => {
    if (i % labelStep !== 0 && i !== keys.length - 1) return;
    const x = padL + barW * i + barW / 2;
    const d = new Date(key + 'T00:00:00');
    const label = (d.getMonth() + 1) + '/' + d.getDate();
    ctx.fillText(label, x, H - 8);
  });
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

// Init
loadData();
// Auto-refresh every 60s
setInterval(loadData, 60000);
// Re-render chart on resize
window.addEventListener('resize', () => { if (allData.length) render(); });
</script>
</body>
</html>
