<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>repfind — Analytics</title>
  <link rel="icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0D0D0D;--bg-deep:#080808;--surface:#1A1A1A;--surface-2:#222;--surface-hover:#2A2A2A;
      --border:#1F1F1F;--border-light:#2A2A2A;--text:#F5F5F5;--text-secondary:#C5C5C5;--text-muted:#777;
      --text-dim:#444;--accent:#C84B2F;--accent-light:#E8624A;--green:#34D399;--yellow:#FBBF24;
      --blue:#60A5FA;--purple:#A78BFA;
      --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    }
    html{-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
    body{
      font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;
      min-height:100vh;letter-spacing:-0.011em;overflow-x:hidden;
    }

    /* ─── HEADER ─── */
    .header{
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;border-bottom:1px solid var(--border);
      background:rgba(13,13,13,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .header-left{display:flex;align-items:center;gap:10px}
    .back-link{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:600;transition:color .2s}
    .back-link:hover{color:var(--accent)}
    .header-logo{font-size:17px;font-weight:800;letter-spacing:-0.03em}
    .header-logo span{color:var(--accent)}
    .header-right{display:flex;align-items:center;gap:8px}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .live-text{font-size:11px;font-weight:600;color:var(--text-muted)}

    /* ─── LAYOUT ─── */
    .feed{max-width:480px;margin:0 auto;padding:0 0 100px}

    /* ─── RANGE PILLS ─── */
    .range-bar{
      display:flex;gap:6px;padding:12px 16px 8px;
      position:sticky;top:49px;z-index:50;
      background:rgba(13,13,13,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .range-btn{
      flex:1;background:var(--surface);border:1px solid var(--border-light);
      color:var(--text-muted);padding:8px 0;border-radius:8px;
      font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;
      font-family:var(--font);text-align:center;
    }
    .range-btn:active{transform:scale(.96)}
    .range-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

    /* ─── BIG STAT HERO ─── */
    .hero-stat{
      padding:32px 20px 28px;text-align:center;
    }
    .hero-number{
      font-size:56px;font-weight:900;letter-spacing:-0.04em;line-height:1;
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent-light) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .hero-label{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-top:8px}
    .hero-sub{font-size:12px;color:var(--text-dim);margin-top:4px}

    /* ─── STAT CARDS (2x2 grid) ─── */
    .stat-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;
      padding:0 16px 24px;
    }
    .stat-card{
      background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:16px;position:relative;overflow:hidden;
    }
    .stat-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px}
    .stat-card.views::before{background:var(--blue)}
    .stat-card.searches::before{background:var(--accent)}
    .stat-card.clicks::before{background:var(--green)}
    .stat-card.ctr::before{background:var(--purple)}
    .stat-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .stat-value{font-size:28px;font-weight:800;letter-spacing:-0.03em;line-height:1.1}
    .stat-sub{font-size:11px;color:var(--text-dim);margin-top:4px}

    /* ─── SECTION ─── */
    .section{padding:0 16px;margin-bottom:24px}
    .section-title{
      font-size:12px;font-weight:800;color:var(--text-muted);
      text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;
      display:flex;align-items:center;gap:6px;
    }

    /* ─── BREAKDOWN BAR ─── */
    .breakdown{display:flex;height:28px;border-radius:8px;overflow:hidden;margin-bottom:10px}
    .breakdown-segment{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.9);overflow:hidden;white-space:nowrap}
    .breakdown-legend{display:flex;gap:12px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--text-muted)}
    .legend-dot{width:8px;height:8px;border-radius:2px}

    /* ─── CHART ─── */
    .chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
    #activityChart{width:100%;height:160px;display:block}
    .chart-legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
    .chart-legend .legend-item{font-size:10px}

    /* ─── SEARCH CARDS ─── */
    .search-list{display:flex;flex-direction:column;gap:6px}
    .search-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 14px;background:var(--surface);border:1px solid var(--border);
      border-radius:10px;transition:background .15s;
    }
    .search-item:active{background:var(--surface-2)}
    .search-query{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .search-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .search-count{font-size:11px;font-weight:700;color:var(--text-muted);background:var(--surface-2);padding:3px 8px;border-radius:100px}
    .search-time{font-size:11px;color:var(--text-dim)}
    .action-badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:4px}
    .action-search{background:rgba(200,75,47,.15);color:var(--accent-light)}
    .action-fallback{background:rgba(251,191,36,.15);color:var(--yellow)}
    .action-clarify{background:rgba(96,165,250,.15);color:var(--blue)}

    /* ─── LOADING ─── */
    .loading{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px}
    .spinner{width:28px;height:28px;border:2.5px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:32px 16px;color:var(--text-dim);font-size:13px}

    /* ─── REFRESH FAB ─── */
    .fab{
      position:fixed;bottom:20px;right:50%;transform:translateX(240px);
      width:44px;height:44px;border-radius:50%;background:var(--accent);
      border:none;color:#fff;font-size:18px;cursor:pointer;
      box-shadow:0 4px 16px rgba(200,75,47,.4);z-index:200;
      display:flex;align-items:center;justify-content:center;
      transition:transform .15s;
    }
    .fab:active{transform:translateX(240px) scale(.9)}
    @media(max-width:480px){.fab{right:16px;transform:none}.fab:active{transform:scale(.9)}}

    /* ─── DESKTOP CENTERING ─── */
    @media(min-width:481px){
      .feed{max-width:480px;border-left:1px solid var(--border);border-right:1px solid var(--border);min-height:100vh}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="/" class="back-link">←</a>
    <span class="header-logo"><span>rep</span>find<span style="color:var(--text-dim)"> stats</span></span>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="live-text" id="lastUpdate">Loading…</span>
  </div>
</div>

<div class="feed">
  <!-- Range -->
  <div class="range-bar">
    <button class="range-btn" data-range="1" onclick="setRange(1)">24h</button>
    <button class="range-btn" data-range="7" onclick="setRange(7)">7d</button>
    <button class="range-btn active" data-range="30" onclick="setRange(30)">30d</button>
    <button class="range-btn" data-range="0" onclick="setRange(0)">All</button>
  </div>

  <!-- Hero stat -->
  <div class="hero-stat">
    <div class="hero-number" id="heroNumber">—</div>
    <div class="hero-label" id="heroLabel">Total Events</div>
    <div class="hero-sub" id="heroSub">Loading…</div>
  </div>

  <!-- Stat grid -->
  <div class="stat-grid">
    <div class="stat-card views">
      <div class="stat-label">👁 Views</div>
      <div class="stat-value" id="statViews">—</div>
      <div class="stat-sub" id="statViewsSub">Visitors</div>
    </div>
    <div class="stat-card searches">
      <div class="stat-label">🔍 Searches</div>
      <div class="stat-value" id="statSearches">—</div>
      <div class="stat-sub" id="statSearchesSub">Product queries</div>
    </div>
    <div class="stat-card clicks">
      <div class="stat-label">👆 Clicks</div>
      <div class="stat-value" id="statClicks">—</div>
      <div class="stat-sub" id="statClicksSub">To agents</div>
    </div>
    <div class="stat-card ctr">
      <div class="stat-label">📊 CTR</div>
      <div class="stat-value" id="statCTR">—</div>
      <div class="stat-sub" id="statCTRSub">Click rate</div>
    </div>
  </div>

  <!-- Breakdown -->
  <div class="section">
    <div class="section-title">Event Breakdown</div>
    <div class="breakdown" id="breakdownBar"></div>
    <div class="breakdown-legend" id="breakdownLegend"></div>
  </div>

  <!-- Chart -->
  <div class="section">
    <div class="section-title">📈 Activity</div>
    <div class="chart-wrap">
      <canvas id="activityChart"></canvas>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Searches</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Views</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Clicks</div>
      </div>
    </div>
  </div>

  <!-- Top Searches -->
  <div class="section">
    <div class="section-title">🔥 Top Searches</div>
    <div class="search-list" id="topSearchList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Recent Searches -->
  <div class="section">
    <div class="section-title">🕒 Recent Activity</div>
    <div class="search-list" id="searchList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<button class="fab" onclick="loadData()">↻</button>

<script>
const SUPABASE_URL = 'https://xacehhtgvubcqdoltazg.supabase.co';
const SUPABASE_KEY = 'sb_pub…1EAA';
const client = window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentRange = 30;
let allData = [];

function setRange(days) {
  currentRange = days;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-range="' + days + '"]').classList.add('active');
  render();
}

async function loadData() {
  document.getElementById('lastUpdate').textContent = 'Loading…';
  let all = [], offset = 0;
  const limit = 1000;
  while (true) {
    const { data, error } = await client.from('repfind_searches').select('*').order('created_at', { ascending: false }).range(offset, offset + limit - 1);
    if (error) { console.error(error); break; }
    if (!data || data.length === 0) break;
    all = all.concat(data);
    if (data.length < limit) break;
    offset += limit;
  }
  allData = all;
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  render();
}

function getFiltered() {
  if (currentRange === 0) return allData;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - currentRange);
  return allData.filter(r => r.created_at >= cutoff.toISOString());
}

function fmt(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return n.toString();
}

function render() {
  const data = getFiltered();
  const views = data.filter(r => r.action === 'page_view').length;
  const searches = data.filter(r => r.action === 'search' || r.action === 'search_fallback');
  const realSearchTerms = searches.filter(r => r.query && r.query.length > 2 && !r.query.startsWith('agent_'));
  const clicks = data.filter(r => r.query === 'agent_click' || (r.action === 'event' && r.query && r.query.includes('click')));
  const total = data.length;
  const ctr = searches.length > 0 ? (clicks.length / searches.length) * 100 : 0;

  // Hero
  document.getElementById('heroNumber').textContent = fmt(total);
  document.getElementById('heroLabel').textContent = 'Total Events';
  document.getElementById('heroSub').textContent = currentRange === 0 ? 'All time' : 'Last ' + currentRange + ' days';

  // Stats
  document.getElementById('statViews').textContent = fmt(views);
  document.getElementById('statViewsSub').textContent = 'Visitors';
  document.getElementById('statSearches').textContent = fmt(searches.length);
  document.getElementById('statSearchesSub').textContent = realSearchTerms.length + ' with queries';
  document.getElementById('statClicks').textContent = fmt(clicks.length);
  document.getElementById('statClicksSub').textContent = 'To agents';
  document.getElementById('statCTR').textContent = ctr.toFixed(1) + '%';
  document.getElementById('statCTRSub').textContent = clicks.length + ' of ' + searches.length;

  // Breakdown
  const actions = {};
  data.forEach(r => { const a = r.action || 'none'; actions[a] = (actions[a] || 0) + 1; });
  renderBreakdown(actions, total);

  // Chart
  renderChart(data);

  // Top searches
  const searchCounts = {};
  realSearchTerms.forEach(r => {
    const q = r.query.toLowerCase().trim();
    if (q.length < 2) return;
    searchCounts[q] = (searchCounts[q] || 0) + 1;
  });
  const top = Object.entries(searchCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
  renderTopSearches(top);

  // Recent
  const recent = data.filter(r => (r.action === 'search' || r.action === 'search_fallback' || r.action === 'clarify') && r.query && r.query.length > 1 && !r.query.startsWith('agent_')).slice(0, 12);
  renderSearchList(recent);
}

const COLORS = { clarify:'#60A5FA', search:'#C84B2F', search_fallback:'#FBBF24', page_view:'#34D399', event:'#A78BFA', none:'#444' };
const LABELS = { clarify:'Chat', search:'Search', search_fallback:'Fallback', page_view:'Views', event:'Events', none:'Other' };

function renderBreakdown(actions, total) {
  const bar = document.getElementById('breakdownBar');
  const legend = document.getElementById('breakdownLegend');
  bar.innerHTML = ''; legend.innerHTML = '';
  Object.entries(actions).sort((a, b) => b[1] - a[1]).forEach(([action, count]) => {
    const pct = total > 0 ? (count / total) * 100 : 0;
    if (pct < 0.5) return;
    const seg = document.createElement('div');
    seg.className = 'breakdown-segment';
    seg.style.background = COLORS[action] || '#444';
    seg.style.flex = count;
    seg.title = (LABELS[action] || action) + ': ' + count;
    if (pct > 6) seg.textContent = count;
    bar.appendChild(seg);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<div class="legend-dot" style="background:' + (COLORS[action] || '#444') + '"></div>' + (LABELS[action] || action) + ' ' + count;
    legend.appendChild(item);
  });
}

function renderSearchList(searches) {
  const el = document.getElementById('searchList');
  if (!searches.length) { el.innerHTML = '<div class="empty">No searches yet</div>'; return; }
  el.innerHTML = searches.map(r => {
    const ago = timeAgo(new Date(r.created_at + 'Z'));
    const cls = r.action === 'search' ? 'action-search' : r.action === 'search_fallback' ? 'action-fallback' : 'action-clarify';
    const label = r.action === 'search_fallback' ? 'fallback' : r.action;
    return '<div class="search-item"><div class="search-query">' + escapeHtml(r.query) + '</div><div class="search-meta">' + (r.results_count > 0 ? '<span class="search-count">' + r.results_count + '</span>' : '') + '<span class="action-badge ' + cls + '">' + label + '</span><span class="search-time">' + ago + '</span></div></div>';
  }).join('');
}

function renderTopSearches(top) {
  const el = document.getElementById('topSearchList');
  if (!top.length) { el.innerHTML = '<div class="empty">Not enough data</div>'; return; }
  el.innerHTML = top.map(([q, c]) => '<div class="search-item"><div class="search-query">' + escapeHtml(q) + '</div><div class="search-meta"><span class="search-count">' + c + 'x</span></div></div>').join('');
}

function renderChart(data) {
  const canvas = document.getElementById('activityChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 160 * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 160;
  ctx.clearRect(0, 0, W, H);

  const days = {};
  const now = new Date();
  const range = currentRange === 0 ? 30 : currentRange;
  for (let i = range - 1; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    days[d.toISOString().slice(0, 10)] = { s: 0, v: 0, c: 0 };
  }
  data.forEach(r => {
    const key = (r.created_at || '').slice(0, 10);
    if (!days[key]) return;
    if (r.action === 'search' || r.action === 'search_fallback') days[key].s++;
    else if (r.action === 'page_view') days[key].v++;
    if (r.query === 'agent_click' || (r.action === 'event' && r.query && r.query.includes('click'))) days[key].c++;
  });

  const keys = Object.keys(days).sort();
  const padL = 32, padR = 8, padT = 8, padB = 24;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const maxVal = Math.max(1, ...keys.map(k => Math.max(days[k].s, days[k].v, days[k].c)));
  const barW = chartW / keys.length;

  // Grid
  ctx.strokeStyle = '#1F1F1F'; ctx.lineWidth = 1;
  ctx.font = '10px Inter, sans-serif'; ctx.fillStyle = '#444';
  for (let i = 0; i <= 3; i++) {
    const y = padT + (chartH / 3) * i;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal - (maxVal / 3) * i), padL - 4, y + 3);
  }

  // Bars
  keys.forEach((key, i) => {
    const d = days[key];
    const x = padL + barW * i;
    const groupW = barW * 0.72;
    const subBarW = (groupW - 4) / 3;
    const drawBar = (val, color, offset) => {
      const h = (val / maxVal) * chartH;
      const bx = x + (barW - groupW) / 2 + offset * subBarW;
      ctx.fillStyle = color;
      ctx.fillRect(bx, padT + chartH - h, subBarW - 1, h);
    };
    drawBar(d.s, '#C84B2F', 0);
    drawBar(d.v, '#60A5FA', 1);
    drawBar(d.c, '#34D399', 2);
  });

  // X labels
  const labelStep = Math.ceil(keys.length / 5);
  ctx.textAlign = 'center';
  keys.forEach((key, i) => {
    if (i % labelStep !== 0 && i !== keys.length - 1) return;
    const x = padL + barW * i + barW / 2;
    const d = new Date(key + 'T00:00:00');
    ctx.fillText((d.getMonth() + 1) + '/' + d.getDate(), x, H - 6);
  });
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  if (s < 86400) return Math.floor(s / 3600) + 'h';
  return Math.floor(s / 86400) + 'd';
}

loadData();
setInterval(loadData, 60000);
window.addEventListener('resize', () => { if (allData.length) render(); });
</script>
</body>
</html>
