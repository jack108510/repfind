<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>repfind carousel — live build</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --panel-code: #0d0d0d;
    --panel-ui: #111;
    --border: #222;
    --text: #f5f5f5;
    --text-muted: #888;
    --text-dim: #555;
    --accent: #4ade80;
    --code-tag: #60A5FA;
    --code-attr: #FBBF24;
    --code-str: #4ade80;
    --code-com: #555;
    --code-key: #E8624A;
    --code-num: #c084fc;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    height: 42px;
    background: #000;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .topbar-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 6px;
  }
  .beat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    padding: 4px 10px;
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.25);
    border-radius: 6px;
  }
  .topbar-controls {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }
  .tb-btn {
    background: #161616;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 11px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tb-btn:hover { color: var(--text); border-color: #3a3a3a; }
  .tb-btn.active { color: var(--accent); border-color: rgba(74,222,128,0.4); }

  /* Split */
  .split { flex: 1; display: flex; overflow: hidden; }
  .pane { position: relative; overflow: hidden; }
  .pane-code {
    width: 42%;
    min-width: 360px;
    background: var(--panel-code);
    border-right: 1px solid var(--border);
  }
  .pane-ui { flex: 1; background: var(--panel-ui); }
  .pane-label {
    position: absolute;
    top: 10px; left: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
  }

  /* Code */
  #code {
    padding: 36px 20px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.75;
    color: #ccc;
    white-space: pre-wrap;
    word-break: break-word;
    height: 100%;
    overflow-y: auto;
  }
  #code::-webkit-scrollbar { width: 7px; }
  #code::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
  #code::-webkit-scrollbar-track { background: transparent; }
  .cursor {
    display: inline-block;
    width: 7px; height: 15px;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 0.8s steps(2) infinite;
    margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .tok-tag { color: var(--code-tag); }
  .tok-attr { color: var(--code-attr); }
  .tok-str { color: var(--code-str); }
  .tok-com { color: var(--code-com); font-style: italic; }
  .tok-num { color: var(--code-num); }
  .tok-key { color: var(--code-key); }

  /* UI stage — scrollable strip of carousel slides */
  #ui-stage {
    padding: 36px 0 0;
    height: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  #ui-stage::-webkit-scrollbar { width: 7px; }
  #ui-stage::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

  /* ─── REAL CAROUSEL SLIDES (from carousel.html) ─── */
  .slide {
    width: 270px;
    height: 480px;
    background: #0a0a0a;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    border-radius: 12px;
    opacity: 0;
    transform: translateY(30px) scale(0.96);
    transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1);
  }
  .slide.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* Scale factor: carousel is 1080x1920, we show at 270x480 (÷4) */
  /* Use transform scale on inner content at full size for crisp text */
  .slide-inner {
    width: 1080px;
    height: 1920px;
    transform: scale(0.25);
    transform-origin: top left;
    position: absolute;
    top: 0; left: 0;
  }

  /* SLIDE 1 */
  .slide-1 { display: flex; flex-direction: column; padding: 0; }
  .slide-1 .header { padding: 90px 70px 40px; text-align: center; }
  .slide-1 .badge {
    display: inline-block; background: #fff; color: #0a0a0a;
    padding: 10px 28px; border-radius: 100px;
    font-weight: 800; font-size: 24px; margin-bottom: 28px;
  }
  .slide-1 .title {
    color: #fff; font-size: 80px; font-weight: 900;
    line-height: 1.02; margin-bottom: 12px; letter-spacing: -3px;
  }
  .slide-1 .subtitle { color: #888; font-size: 30px; }
  .slide-1 .phone-wrap {
    flex: 1; display: flex; justify-content: center; align-items: center; padding: 0 50px;
  }
  .slide-1 .phone {
    width: 720px; height: auto; max-height: 1300px;
    border-radius: 36px; overflow: hidden;
    box-shadow: 0 0 80px rgba(255,255,255,0.05), 0 0 0 6px #222, 0 0 0 10px #333;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .slide-1 .phone img { width: 100%; display: block; }
  .slide-1 .footer { padding: 40px 70px 80px; text-align: center; }
  .slide-1 .swipe-hint { color: #555; font-size: 26px; font-weight: 600; }

  /* PRODUCT SLIDES */
  .slide-product { display: flex; flex-direction: column; }
  .slide-product .product-image { flex: 1; width: 100%; position: relative; overflow: hidden; }
  .slide-product .product-image img { width: 100%; height: 100%; object-fit: cover; }
  .slide-product .gradient {
    position: absolute; bottom: 0; left: 0; right: 0; height: 70%;
    background: linear-gradient(to bottom, transparent 0%, rgba(10,10,10,0.3) 30%, rgba(10,10,10,0.95) 100%);
    pointer-events: none;
  }
  .slide-product .top-bar {
    position: absolute; top: 0; left: 0; right: 0; padding: 50px 60px;
    display: flex; justify-content: space-between; align-items: center; z-index: 2;
  }
  .slide-product .slide-counter {
    color: rgba(255,255,255,0.5); font-size: 56px; font-weight: 900; letter-spacing: -2px;
  }
  .slide-product .platform-tag {
    background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); color: #fff;
    padding: 10px 24px; border-radius: 100px; font-size: 24px; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .slide-product .product-info {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 60px; z-index: 2;
  }
  .slide-product .brand-tag {
    color: rgba(255,255,255,0.6); font-size: 30px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px;
  }
  .slide-product .product-name {
    color: #fff; font-size: 56px; font-weight: 800; line-height: 1.1;
    margin-bottom: 28px; letter-spacing: -2px; text-shadow: 0 2px 30px rgba(0,0,0,0.5);
  }
  .slide-product .price-row { display: flex; align-items: center; gap: 20px; }
  .slide-product .price {
    color: #4ade80; font-size: 72px; font-weight: 900; letter-spacing: -3px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .slide-product .price-label { color: rgba(255,255,255,0.5); font-size: 26px; font-weight: 500; }
  .slide-product .source-line {
    margin-top: 20px; color: rgba(255,255,255,0.35); font-size: 22px; font-weight: 500;
  }

  /* CTA */
  .slide-cta {
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; padding: 80px; text-align: center;
  }
  .slide-cta .logo {
    width: 120px; height: 120px; border-radius: 24px; background: #fff;
    display: flex; justify-content: center; align-items: center;
    margin-bottom: 50px; font-size: 52px; font-weight: 900; color: #0a0a0a; letter-spacing: -3px;
  }
  .slide-cta .cta-title {
    color: #fff; font-size: 96px; font-weight: 900; line-height: 1.02;
    margin-bottom: 30px; letter-spacing: -4px;
  }
  .slide-cta .cta-sub {
    color: #888; font-size: 36px; margin-bottom: 60px; line-height: 1.4; max-width: 800px;
  }
  .slide-cta .url-box {
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 24px 64px; color: #fff;
    font-size: 52px; font-weight: 800; letter-spacing: -2px; margin-bottom: 60px;
  }
  .slide-cta .features { display: flex; flex-direction: column; gap: 18px; text-align: left; }
  .slide-cta .feature {
    color: #aaa; font-size: 30px; display: flex; align-items: center; gap: 16px;
  }
  .slide-cta .feature .check {
    color: #4ade80; font-weight: 800; font-size: 32px; width: 40px; text-align: center;
  }

  /* Progress bar */
  .progress {
    position: fixed; bottom: 0; left: 0;
    height: 2px; background: var(--accent);
    width: 0; transition: width 0.4s; z-index: 100;
  }
  .hint {
    position: absolute; bottom: 10px; right: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim); z-index: 10;
  }
</style>
</head>

<div class="topbar">

<div class="progress" id="progress"></div>

const $ = (s) => document.querySelector(s);
const stage = $('#ui-stage');
const codeEl = $('#code');
const beatLabel = $('#beat-label');
const progress = $('#progress');

let speed = 1;
let paused = false;
let typingTimer = null;

// ─── Syntax highlight ───
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlight(line) {
  if (/^\s*(\/\/|<!--)/.test(line)) return `<span class="tok-com">${esc(line)}</span>`;
  let h = esc(line);
  h = h.replace(/(&quot;[^&]*&quot;|"[^"]*")/g, '<span class="tok-str">$1</span>');
  h = h.replace(/(&lt;\/?)([a-zA-Z0-9-]+)/g, '$1<span class="tok-tag">$2</span>');
  h = h.replace(/([a-zA-Z-]+)=(&quot;|")/g, '<span class="tok-attr">$1</span>=$2');
  h = h.replace(/\b(\d+)\b/g, '<span class="tok-num">$1</span>');
  return h;
}

function typeBlock(lines, done) {
  let li = 0, ci = 0;
  function tick() {
    if (paused) { typingTimer = setTimeout(tick, 60); return; }
    if (li >= lines.length) { done(); return; }
    const line = lines[li];
    const step = Math.max(1, Math.round(3 * speed));
    const next = line.slice(0, ci + step);
    const prev = lines.slice(0, li).map(highlight).join('\n');
    codeEl.innerHTML = prev + (prev ? '\n' : '') + highlight(next) + '<span class="cursor"></span>';
    ci += step;
    if (ci >= line.length) {
      li++; ci = 0;
      typingTimer = setTimeout(tick, 60 / speed);
    } else {
      typingTimer = setTimeout(tick, 6 / speed);
    }
  }
  tick();
}

function el(html) {
  const d = document.createElement('div');
  d.innerHTML = html.trim();
  return d.firstElementChild;
}

function clearAll() {
  stage.innerHTML = '';
  codeEl.innerHTML = '';
  progress.style.width = '0%';
}

// ─── PLAYER ───
function playBeat(idx) {
  if (idx >= beats.length) {
    beatLabel.textContent = `✓ done · ${beats.length} beats`;
    beatLabel.style.color = '#4ade80';
    beatLabel.style.borderColor = 'rgba(74,222,128,0.4)';
    return;
  }
  const beat = beats[idx];
  beatLabel.textContent = `beat ${idx + 1} / ${beats.length} · ${beat.name}`;
  beatLabel.style.color = '';
  beatLabel.style.borderColor = '';

  typeBlock(beat.code, () => {
    beat.action();
    setTimeout(() => playBeat(idx + 1), 500 / speed);
  });
}

function start() {
  clearTimeout(typingTimer);
  clearAll();
  playBeat(0);
}

// ─── Controls ───
function setSpeed(s, btnId) {
  speed = s;
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
  $('#' + btnId).classList.add('active');
}
$('#btn-1x').onclick = () => setSpeed(1, 'btn-1x');
$('#btn-2x').onclick = () => setSpeed(2.5, 'btn-2x');
$('#btn-3x').onclick = () => setSpeed(5, 'btn-3x');
$('#btn-replay').onclick = start;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); paused = !paused; }
  if (e.key.toLowerCase() === 'r') start();
});

// Auto-start
setTimeout(start, 400);
</script>
</body>
</html>
