<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repfind — find the best reps, fast</title>
  <meta name="description" content="Search across Weidian, Taobao, and 1688. AI verdicts on price, quality, and legitimacy. Send straight to your agent.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ChatGPT-inspired dark palette */
      --bg: #1A1A1A;
      --bg-deep: #131313;
      --bg-sidebar: #0F0F0F;
      --surface: #242424;
      --surface-2: #2E2E2E;
      --surface-hover: #343434;
      --border: #2A2A2A;
      --border-light: #383838;
      --text: #F5F5F5;
      --text-secondary: #C5C5C5;
      --text-muted: #888888;
      --text-dim: #5A5A5A;
      --accent: #C84B2F;
      --accent-light: #E8624A;
      --accent-dim: rgba(200, 75, 47, 0.10);
      --accent-subtle: rgba(200, 75, 47, 0.06);
      --green: #34D399;
      --yellow: #FBBF24;
      --red: #F87171;
      --blue: #60A5FA;
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --radius-pill: 100px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    /* ─── FONT RENDERING ─── */
    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
      letter-spacing: -0.011em;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* ─── SIDEBAR ─── */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 10px;
      z-index: 100;
      transition: transform var(--transition);
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      margin-bottom: 18px;
    }
    .sidebar-logo {
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }
    .sidebar-logo .find { color: var(--accent); }
    .new-search-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 450;
      cursor: pointer;
      transition: all var(--transition);
      width: 100%;
      text-align: left;
    }
    .new-search-btn:hover {
      background: var(--surface);
      color: var(--text);
    }
    .new-search-btn svg {
      opacity: 0.7;
      flex-shrink: 0;
    }
    .sidebar-section {
      margin-top: 20px;
    }
    .history-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      padding: 4px 12px 6px;
      letter-spacing: 0.02em;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item:hover {
      background: var(--surface);
      color: var(--text);
    }
    .history-item svg {
      opacity: 0.4;
      flex-shrink: 0;
    }
    .sidebar-footer {
      margin-top: auto;
      padding: 12px 8px 4px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer-link {
      display: block;
      font-size: 0.75rem;
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: var(--radius-xs);
      transition: color var(--transition);
    }
    .sidebar-footer-link:hover { color: var(--text-muted); }

    /* ─── MAIN ─── */
    .main {
      margin-left: 260px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: margin var(--transition);
    }

    /* ─── TOP BAR ─── */
    .topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(26, 26, 26, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 40;
    }
    .topbar.show { display: flex; }
    .topbar-logo {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }
    .topbar-logo .find { color: var(--accent); }
    .topbar-right {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .topbar-btn {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: var(--radius-xs);
      transition: all var(--transition);
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: none;
    }
    .topbar-btn:hover {
      color: var(--text);
      background: var(--surface);
    }

    /* ─── WELCOME ─── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      min-height: calc(100vh - 50px);
    }
    .welcome.hide { display: none; }
    .welcome-logo {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 12px;
    }
    .welcome-logo .find { color: var(--accent); }
    .welcome-tagline {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      max-width: 420px;
      text-align: center;
      line-height: 1.5;
    }

    /* ─── PROMPT ─── */
    .prompt-container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }
    .prompt-box {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 8px 8px 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color var(--transition), box-shadow var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .prompt-box:focus-within {
      border-color: var(--text-dim);
      box-shadow: 0 0 0 1px var(--text-dim), var(--shadow-md);
    }
    .prompt-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      padding: 12px 0;
    }
    .prompt-box input::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--text);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .send-btn:disabled {
      background: var(--border-light);
      color: var(--text-dim);
      cursor: not-allowed;
    }
    .send-btn:not(:disabled):hover {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
    }

    /* ─── SUGGESTIONS ─── */
    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }
    .suggestion {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 450;
    }
    .suggestion:hover {
      background: var(--surface-2);
      border-color: var(--border-light);
      color: var(--text);
      transform: translateY(-1px);
    }
    .suggestion-icon {
      font-size: 0.95rem;
    }

    /* ─── CHAT AREA ─── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 200px;
      display: none;
    }
    .chat-area.show { display: block; }
    .chat-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ─── QUERY BUBBLE ─── */
    .query-bubble {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
      animation: fadeInUp 0.3s ease;
    }
    .query-bubble span {
      background: var(--surface-2);
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font-size: 0.88rem;
      font-weight: 500;
      max-width: 80%;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── AI RESPONSE ─── */
    .ai-response { animation: fadeInUp 0.4s ease; }

    /* ─── TYPING / LOADING STEPS ─── */
    .loading-steps {
      padding: 4px 0 8px;
    }
    .loading-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #9B3A24);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }
    .bot-name {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .bot-name .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--accent-dim);
      color: var(--accent-light);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .step-list {
      padding-left: 34px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-dim);
      animation: fadeInUp 0.3s ease backwards;
    }
    .step-check {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    .step-check.done {
      background: var(--green);
      border-color: var(--green);
    }
    .step-check.done svg {
      opacity: 1;
    }
    .step-check svg {
      width: 8px;
      height: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .step-check.spinner-mini {
      border: 1.5px solid var(--border-light);
      border-top-color: var(--accent);
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step-item.done { color: var(--text-muted); }
    .step-item.active { color: var(--text-secondary); }

    /* ─── VERDICT ─── */
    .verdict-block {
      margin-bottom: 20px;
    }
    .verdict-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .verdict-text {
      font-size: 0.94rem;
      line-height: 1.7;
      color: var(--text);
      padding-left: 34px;
      letter-spacing: -0.005em;
    }
    .verdict-text strong { font-weight: 700; }
    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ─── ACTION BAR ─── */
    .action-bar {
      display: flex;
      gap: 4px;
      padding-left: 34px;
      margin-top: 14px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.2s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all var(--transition);
    }
    .action-btn:hover {
      background: var(--surface);
      color: var(--text-secondary);
    }
    .action-btn svg {
      opacity: 0.7;
    }

    /* ─── PROVENANCE ─── */
    .provenance {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 34px;
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .provenance .dot-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-dim);
      opacity: 0.5;
    }

    /* ─── STAT PILLS ─── */
    .stat-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-left: 34px;
      margin-top: 16px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      transition: border-color var(--transition);
    }
    .stat-pill:hover {
      border-color: var(--border-light);
    }
    .stat-pill-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .stat-pill-icon.price { background: var(--accent-dim); color: var(--accent-light); }
    .stat-pill-icon.range { background: rgba(96,165,250,0.1); color: var(--blue); }
    .stat-pill-icon.legit { background: rgba(52,211,153,0.1); color: var(--green); }
    .stat-pill-content {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .stat-pill-label {
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      font-weight: 600;
    }
    .stat-pill-value {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .stat-pill-value.accent { color: var(--accent-light); }
    .stat-pill-value.green { color: var(--green); }
    .stat-pill-value.yellow { color: var(--yellow); }
    .stat-pill-sub {
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    /* ─── RESULTS ─── */
    .results-section {
      padding-left: 34px;
      margin-top: 28px;
    }
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .results-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
    }
    .inline-filters {
      display: flex;
      gap: 4px;
    }
    .inline-filter {
      font-size: 0.76rem;
      padding: 4px 10px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-xs);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
    }
    .inline-filter.active {
      background: var(--surface);
      color: var(--text);
    }
    .inline-filter:hover:not(.active) {
      color: var(--text-secondary);
    }
    .results-list {
      display: grid;
      gap: 8px;
    }

    /* ─── RESULT CARD ─── */
    .result-card {
      display: flex;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: all var(--transition);
      animation: cardIn 0.35s ease backwards;
      cursor: pointer;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-card:hover {
      border-color: var(--border-light);
      background: var(--surface-2);
    }
    .result-img {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-xs);
      background: var(--border);
      flex-shrink: 0;
      object-fit: cover;
    }
    .result-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }
    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .result-info { min-width: 0; }
    .result-name {
      font-size: 0.86rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
    }
    .result-seller {
      font-size: 0.76rem;
      color: var(--text-dim);
    }
    .result-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    .platform-badge {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .platform-weidian { background: #162D40; color: #6BAED6; }
    .platform-taobao  { background: #2D1818; color: #E8715A; }
    .platform-1688    { background: #182018; color: #6BAA6B; }

    .result-price {
      text-align: right;
      flex-shrink: 0;
    }
    .price-main {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .price-cny {
      font-size: 0.68rem;
      color: var(--text-dim);
    }
    .result-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .agent-btn {
      flex: 1;
      font-size: 0.73rem;
      font-weight: 600;
      padding: 6px 0;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
    }
    .agent-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ─── QUALITY ─── */
    .quality {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .quality-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .quality-good .quality-dot { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.4); }
    .quality-ok .quality-dot { background: var(--yellow); }
    .quality-risky .quality-dot { background: var(--red); }
    .quality-good { color: var(--green); }
    .quality-ok { color: var(--yellow); }
    .quality-risky { color: var(--red); }

    /* ─── FOLLOW-UPS ─── */
    .follow-ups {
      padding-left: 34px;
      margin-top: 28px;
    }
    .follow-up-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .follow-up-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .follow-up-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 450;
    }
    .follow-up-chip:hover {
      background: var(--surface-2);
      border-color: var(--border-light);
      color: var(--text);
    }

    /* ─── DOCKED INPUT ─── */
    .docked-input {
      position: fixed;
      bottom: 0;
      left: 260px;
      right: 0;
      padding: 16px 24px 20px;
      background: linear-gradient(to top, var(--bg) 50%, transparent);
      display: none;
      z-index: 50;
    }
    .docked-input.show { display: flex; }
    .docked-input-inner {
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

// ─── Affiliate Link Builder ───
function buildAgentLink(agentKey, product) {
  const agent = AGENTS[agentKey];
  if (!agent) return '#';

  // If product has a stored CNFans URL (from database), use it
  if (agentKey === 'cnfans' && product.cnfansUrl) {
    return product.cnfansUrl; // Already has ref=1243144
  }

  // CNFans link format with affiliate ref
  if (agentKey === 'cnfans') {
    const platform = (product.platform || 'weidian').toUpperCase();
    const base = `https://cnfans.com/product?platform=${platform}&id=${product.id}`;
    return agent.ref ? `${base}&ref=${agent.ref}` : base;
  }

  // KakoBuy / Oopbuy
  if (agentKey === 'kakobuy') {
    return `https://www.kakobuy.com/item/${product.platform || 'weidian'}/${product.id}`;
  }
  if (agentKey === 'oopbuy') {
    return `https://oopbuy.com/product/${product.platform || 'weidian'}/${product.id}`;
  }

  return '#';
}
const PLATFORMS = {
  weidian: { label: 'Weidian', class: 'platform-weidian' },

// ─── Webhook config ───
const WEBHOOK_URL = 'https://n8n.wildeautomations.com/webhook/repfind-chat';

let searchHistory = [];
let currentPlatform = 'all';
let isSearching = false;
let chatHistory = []; // conversation context for AI
let currentResults = []; // current search results for export
let lastSearchQuery = ''; // last query for export naming
let sessionId = sessionStorage.getItem('repfind_session') || ('sess_' + Math.random().toString(36).substr(2, 12) + Date.now().toString(36));

      headers: { 'Content-Type': 'application/json' },

    // Update conversation history

function updateStep(step) {
  const stepEl = document.querySelector(`[data-step="${step}"]`);

  // Mark previous as done
  if (step > 0) {
    const prevEl = document.querySelector(`[data-step="${step - 1}"]`);
    const prevCheck = document.getElementById(`check${step - 1}`);
    if (prevEl) { prevEl.classList.remove('active'); prevEl.classList.add('done'); prevEl.style.opacity = '0.5'; }
    if (prevCheck) {
      prevCheck.classList.remove('spinner-mini');

  stepEl.classList.add('active');
  stepEl.style.opacity = '1';
  checkEl.classList.add('spinner-mini');
}

// ─── Stream text ───
function streamText(el, html, callback) {
  const tokens = [];
  let i = 0;
  while (i < html.length) {
    if (html[i] === '<') {
      const end = html.indexOf('>', i);
      tokens.push({ tag: true, text: html.slice(i, end + 1) });
      i = end + 1;
    } else {
      tokens.push({ tag: false, text: html[i] });
      i++;
    }
  }

  el.innerHTML = '';
  let idx = 0;
  let displayed = '';

  function tick() {
    if (idx >= tokens.length) {
      el.innerHTML = displayed;
      if (callback) setTimeout(callback, 200);
      return;
    }
    const token = tokens[idx];
    if (token.tag) {
      displayed += token.text;
      idx++;
      tick();
    } else {
      displayed += token.text;
      idx++;
      el.innerHTML = displayed + '<span class="cursor-blink"></span>';
      setTimeout(tick, 15 + Math.random() * 25);
    }
    scrollToBottom();
  }
  tick();
}

// ─── Stats ───
function showStats(stats) {
  const el = document.getElementById('statPills');
  if (!el) return;
  el.innerHTML = stats.map((s, i) => {
    const iconClass = s.label.toLowerCase().includes('price') ? 'price' :
                      s.label.toLowerCase().includes('range') ? 'range' : 'legit';
    const icon = iconClass === 'price' ? '¥' : iconClass === 'range' ? '↔' : '✓';
    return `<div class="stat-pill" style="animation:cardIn 0.3s ease backwards;animation-delay:${i*0.12}s">
      <div class="stat-pill-icon ${iconClass}">${icon}</div>
      <div class="stat-pill-content">
        <span class="stat-pill-label">${s.label}</span>
        <span class="stat-pill-value ${s.class}">${s.value}</span>
        ${s.sub ? `<span class="stat-pill-sub">${s.sub}</span>` : ''}
      </div>
    </div>`;
  }).join('');
  el.style.display = 'flex';
}

// ─── Results ───
function renderResults(results) {
  const list = document.getElementById('resultsList');
  const section = document.getElementById('resultsSection');
  if (!list || !section) return;
  section.style.display = 'block';

  scrollToBottom();
}

  ).join('');

// ─── Send to agent ───
function sendToAgent(agentKey, resultId, btn) {
  // Find the product from current results
  const card = btn.closest('.result-card');
  if (!card) return;
  const productName = card.querySelector('.result-name')?.textContent || '';

  // Find product in current results
  const product = currentResults.find(r => r.id === resultId);
  if (!product) return;

  const link = buildAgentLink(agentKey, product);
  const agent = AGENTS[agentKey];

  const original = btn.textContent;
  btn.textContent = 'Opening...';
  btn.style.background = 'var(--accent)';
  btn.style.borderColor = 'var(--accent)';
  btn.style.color = 'white';

  // Open the affiliate link in new tab
  window.open(link, '_blank', 'noopener,noreferrer');

  setTimeout(() => {
    btn.textContent = '✓ Opened';
    showToast(`Opening ${agent.name}... Your referral is tagged`);
    setTimeout(() => {
      btn.textContent = original;
      btn.style.cssText = '';
    }, 1400);
  }, 400);
}

// ─── Export Spreadsheet (CSV) ───
function exportSpreadsheet() {
  if (!currentResults || currentResults.length === 0) {
    showToast('No results to export');
    return;
  }

  const query = lastSearchQuery || 'repfind';
  const rows = [
    ['Product', 'Seller', 'Platform', 'Price (CNY)', 'Price (USD)', 'Rating', 'Sales', 'Quality', 'CNFans Link (Affiliate)', 'KakoBuy Link', 'OopBuy Link']
  ];

  currentResults.forEach(r => {
    const cnfansLink = buildAgentLink('cnfans', r);
    const kakobuyLink = buildAgentLink('kakobuy', r);
    const oopbuyLink = buildAgentLink('oopbuy', r);
    rows.push([
      r.name,
      r.seller,
      r.platform,
      '¥' + r.priceCNY,
      '$' + r.priceUSD,
      '⭐' + r.rating,
      r.sales.toLocaleString() + ' sold',
      r.quality,
      cnfansLink,
      kakobuyLink,
      oopbuyLink,
    ]);
  });

  // Build CSV
  const csv = rows.map(row =>
    row.map(cell => {
      const s = String(cell);
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"' + s.replace(/"/g, '""') + '"'
        : s;
    }).join(',')
  ).join('\n');

  // Download
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const filename = `repfind-${query.toLowerCase().replace(/[^a-z0-9]/g, '-')}-${Date.now()}.csv`;
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Spreadsheet exported — ${currentResults.length} products with affiliate links`);
}

// ─── Google Sheet export (opens pre-filled link) ───
function exportToGoogleSheets() {
  if (!currentResults || currentResults.length === 0) {
    showToast('No results to export');
    return;
  }
  const query = lastSearchQuery || 'repfind';
  // Build a simple HTML table that can be pasted into Google Sheets
  const headers = ['Product','Seller','Platform','Price (CNY)','Price (USD)','Rating','Sales','Quality','CNFans (Affiliate)'];
  const rows = currentResults.map(r => [
    r.name, r.seller, r.platform, '¥'+r.priceCNY, '$'+r.priceUSD, '⭐'+r.rating, r.sales+' sold', r.quality, buildAgentLink('cnfans', r)
  ]);
  const tsv = [headers, ...rows].map(row => row.map(c => String(c).replace(/\t/g,' ').replace(/\n/g,' ')).join('\t')).join('\n');

}

// ─── Regenerate ───
function regenerateSearch() {

// ─── Follow-ups ───
function renderFollowUps(query) {

  const suggestions = [
    `${query} QC review`,

// ─── Filters ───
function wireFilters() {
  document.querySelectorAll('.inline-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.inline-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPlatform = btn.dataset.platform;
      applyFilter(currentPlatform);
    });
  });
}
function applyFilter(platform) {
  document.querySelectorAll('.result-card').forEach(card => {
    card.style.display = (platform === 'all' || card.dataset.platform === platform) ? '' : 'none';
  });
}

// ─── History ───
function addHistory(query) {
  if (searchHistory[0] === query) return;
  searchHistory = [query, ...searchHistory.filter(q => q !== query)].slice(0, 10);
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  if (searchHistory.length === 0) {
    el.innerHTML = '<div class="history-item" style="opacity:0.5;cursor:default;">No searches yet</div>';
    return;
  }
  el.innerHTML = '';
  searchHistory.forEach(q => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><span>${escapeHtml(q)}</span>`;
    item.onclick = () => { mainInput.value = q; doSearch(); };
    el.appendChild(item);
  });
}

// ─── Utils ───
function scrollToBottom() {
  const area = document.getElementById('chatArea');
  if (area) area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) { return escapeHtml(str).replace(/"/g, '&quot;'); }

async function fetchProducts(query, limit = 12) {
  // Search by text in name or by category/tags
  const searchTerm = query.toLowerCase().trim();
  
  // Try full-text search first
  const searchUrl = `${SB_URL}/rest/v1/repfind_products?select=name,external_id,price_usd,price_cny,image_url,cnfans_url,category,platform&or=(name.ilike.%${encodeURIComponent(searchTerm)}%,category.ilike.%${encodeURIComponent(searchTerm)}%,search_tags.cs.{${encodeURIComponent(searchTerm)}})&limit=${limit}&order=price_usd.asc`;
  
  try {
    const resp = await fetch(searchUrl, {
      headers: {
        'apikey': SB_ANON,
        'Authorization': `Bearer ${SB_ANON}`,
      }
    });
    
    if (!resp.ok) throw new Error(`Supabase error: ${resp.status}`);
    const data = await resp.json();
    
    // If no exact matches, try partial word matching
    if (data.length === 0) {
      const words = searchTerm.split(/\s+/).filter(w => w.length > 2);
      if (words.length > 0) {
        const partialQuery = words.map(w => `name.ilike.%${w}%`).join(',');
        const partialUrl = `${SB_URL}/rest/v1/repfind_products?select=name,external_id,price_usd,price_cny,image_url,cnfans_url,category,platform&or=(${partialQuery})&limit=${limit}&order=price_usd.asc`;
        const resp2 = await fetch(partialUrl, {
          headers: {
            'apikey': SB_ANON,
            'Authorization': `Bearer ${SB_ANON}`,
          }
        });
        if (resp2.ok) {
          return await resp2.json();
        }
      }
    }
    
    return data;
  } catch (err) {
    console.error('Product fetch error:', err);
    return [];
  }
}

function transformProducts(rawProducts) {
  return rawProducts.map((p, i) => ({
    id: p.external_id || `prod-${i}`,
    name: p.name || 'Unknown Product',
    seller: p.category ? `${p.category} seller` : 'Verified Seller',
    rating: 4.3 + (Math.sin(i * 7) * 0.5),
    sales: Math.floor(Math.abs(Math.sin(i * 13)) * 4000) + 200,
    platform: p.platform || 'weidian',
    priceCNY: p.price_cny || Math.round((p.price_usd || 70) * 7.25),
    priceUSD: p.price_usd ? p.price_usd.toFixed(2) : '70.00',
    quality: i % 5 === 4 ? 'ok' : 'good',
    img: p.image_url || `https://picsum.photos/seed/${encodeURIComponent(p.external_id || i)}/100/100`,

function generateVerdict(query, results) {
  const prices = results.map(r => r.priceCNY);
  const avg = Math.round(prices.reduce((a,b) => a+b, 0) / prices.length);
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const goodCount = results.filter(r => r.quality === 'good').length;
  const okCount = results.filter(r => r.quality === 'ok').length;
  const riskyCount = results.filter(r => r.quality === 'risky').length;
  const avgUSD = (avg / 7.25).toFixed(2);

  let verdict;
  if (goodCount >= 3) {
    verdict = `Found <strong>${goodCount} legit sellers</strong> with solid ratings and real sales volume. The market for "${escapeHtml(query)}" is healthy — avg price is <strong>¥${avg} ($${avgUSD})</strong> and you've got plenty of options.`;
  } else if (goodCount >= 1) {
    verdict = `Mixed results. <strong>${goodCount} sellers</strong> look trustworthy, ${okCount + riskyCount} are questionable. Avg price is <strong>¥${avg} ($${avgUSD})</strong> — stick to the green-rated ones below.`;
  } else {
    verdict = `Most results for "${escapeHtml(query)}" look risky. Low sales, poor ratings. Avg price is <strong>¥${avg} ($${avgUSD})</strong>. Proceed with caution — check QC pics before committing.`;
  }

  return {
    verdict,
    stats: [
      { label: 'Avg Price', value: `¥${avg}`, sub: `$${avgUSD}`, class: 'accent' },
      { label: 'Price Range', value: `¥${min}–${max}`, class: '' },
      { label: 'Legit Sellers', value: `${goodCount}/${results.length}`, class: goodCount >= 3 ? 'green' : goodCount >= 1 ? 'yellow' : '' },
    ],
  };
}
