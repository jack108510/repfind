<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repfind — find the best reps, fast</title>
  <meta name="description" content="Search across Weidian, Taobao, and 1688. AI verdicts on price, quality, and legitimacy. Send straight to your agent.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ChatGPT-inspired dark palette */
      --bg: #1A1A1A;
      --bg-deep: #131313;
      --bg-sidebar: #0F0F0F;
      --surface: #242424;
      --surface-2: #2E2E2E;
      --surface-hover: #343434;
      --border: #2A2A2A;
      --border-light: #383838;
      --text: #F5F5F5;
      --text-secondary: #C5C5C5;
      --text-muted: #888888;
      --text-dim: #5A5A5A;
      --accent: #C84B2F;
      --accent-light: #E8624A;
      --accent-dim: rgba(200, 75, 47, 0.10);
      --accent-subtle: rgba(200, 75, 47, 0.06);
      --green: #34D399;
      --yellow: #FBBF24;
      --red: #F87171;
      --blue: #60A5FA;
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --radius-pill: 100px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    /* ─── FONT RENDERING ─── */
    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
      letter-spacing: -0.011em;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* ─── SIDEBAR ─── */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 10px;
      z-index: 100;
      transition: transform var(--transition);
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      margin-bottom: 18px;
    }
    .sidebar-logo {
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }
    .sidebar-logo .find { color: var(--accent); }
    .new-search-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 450;
      cursor: pointer;
      transition: all var(--transition);
      width: 100%;
      text-align: left;
    }
    .new-search-btn:hover {
      background: var(--surface);
      color: var(--text);
    }
    .new-search-btn svg {
      opacity: 0.7;
      flex-shrink: 0;
    }
    .sidebar-section {
      margin-top: 20px;
    }
    .history-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      padding: 4px 12px 6px;
      letter-spacing: 0.02em;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item:hover {
      background: var(--surface);
      color: var(--text);
    }
    .history-item svg {
      opacity: 0.4;
      flex-shrink: 0;
    }
    .sidebar-footer {
      margin-top: auto;
      padding: 12px 8px 4px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer-link {
      display: block;
      font-size: 0.75rem;
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: var(--radius-xs);
      transition: color var(--transition);
    }
    .sidebar-footer-link:hover { color: var(--text-muted); }

    /* ─── MAIN ─── */
    .main {
      margin-left: 260px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: margin var(--transition);
    }

    /* ─── TOP BAR ─── */
    .topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(26, 26, 26, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 40;
    }
    .topbar.show { display: flex; }
    .topbar-logo {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }
    .topbar-logo .find { color: var(--accent); }
    .topbar-right {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .topbar-btn {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: var(--radius-xs);
      transition: all var(--transition);
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: none;
    }
    .topbar-btn:hover {
      color: var(--text);
      background: var(--surface);
    }

    /* ─── WELCOME ─── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      min-height: calc(100vh - 50px);
    }
    .welcome.hide { display: none; }
    .welcome-logo {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 12px;
    }
    .welcome-logo .find { color: var(--accent); }
    .welcome-tagline {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      max-width: 420px;
      text-align: center;
      line-height: 1.5;
    }

    /* ─── PROMPT ─── */
    .prompt-container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }
    .prompt-box {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 8px 8px 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color var(--transition), box-shadow var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .prompt-box:focus-within {
      border-color: var(--text-dim);
      box-shadow: 0 0 0 1px var(--text-dim), var(--shadow-md);
    }
    .prompt-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      padding: 12px 0;
    }
    .prompt-box input::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--text);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .send-btn:disabled {
      background: var(--border-light);
      color: var(--text-dim);
      cursor: not-allowed;
    }
    .send-btn:not(:disabled):hover {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
    }

    /* ─── SUGGESTIONS ─── */
    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }
    .suggestion {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 450;
    }
    .suggestion:hover {
      background: var(--surface-2);
      border-color: var(--border-light);
      color: var(--text);
      transform: translateY(-1px);
    }
    .suggestion-icon {
      font-size: 0.95rem;
    }

    /* ─── CHAT AREA ─── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 200px;
      display: none;
    }
    .chat-area.show { display: block; }
    .chat-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ─── QUERY BUBBLE ─── */
    .query-bubble {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
      animation: fadeInUp 0.3s ease;
    }
    .query-bubble span {
      background: var(--surface-2);
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font-size: 0.88rem;
      font-weight: 500;
      max-width: 80%;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── AI RESPONSE ─── */
    .ai-response { animation: fadeInUp 0.4s ease; }

    /* ─── TYPING / LOADING STEPS ─── */
    .loading-steps {
      padding: 4px 0 8px;
    }
    .loading-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #9B3A24);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }
    .bot-name {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .bot-name .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--accent-dim);
      color: var(--accent-light);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .step-list {
      padding-left: 34px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-dim);
      animation: fadeInUp 0.3s ease backwards;
    }
    .step-check {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    .step-check.done {
      background: var(--green);
      border-color: var(--green);
    }
    .step-check.done svg {
      opacity: 1;
    }
    .step-check svg {
      width: 8px;
      height: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .step-check.spinner-mini {
      border: 1.5px solid var(--border-light);
      border-top-color: var(--accent);
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step-item.done { color: var(--text-muted); }
    .step-item.active { color: var(--text-secondary); }

    /* ─── VERDICT ─── */
    .verdict-block {
      margin-bottom: 20px;
    }
    .verdict-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .verdict-text {
      font-size: 0.94rem;
      line-height: 1.7;
      color: var(--text);
      padding-left: 34px;
      letter-spacing: -0.005em;
    }
    .verdict-text strong { font-weight: 700; }
    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ─── ACTION BAR ─── */
    .action-bar {
      display: flex;
      gap: 4px;
      padding-left: 34px;
      margin-top: 14px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.2s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all var(--transition);
    }
    .action-btn:hover {
      background: var(--surface);
      color: var(--text-secondary);
    }
    .action-btn svg {
      opacity: 0.7;
    }

    /* ─── PROVENANCE ─── */
    .provenance {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 34px;
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .provenance .dot-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-dim);
      opacity: 0.5;
    }

    /* ─── STAT PILLS ─── */
    .stat-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-left: 34px;
      margin-top: 16px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      transition: border-color var(--transition);
    }
    .stat-pill:hover {
      border-color: var(--border-light);
    }
    .stat-pill-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .stat-pill-icon.price { background: var(--accent-dim); color: var(--accent-light); }
    .stat-pill-icon.range { background: rgba(96,165,250,0.1); color: var(--blue); }
    .stat-pill-icon.legit { background: rgba(52,211,153,0.1); color: var(--green); }
    .stat-pill-content {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .stat-pill-label {
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      font-weight: 600;
    }
    .stat-pill-value {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .stat-pill-value.accent { color: var(--accent-light); }
    .stat-pill-value.green { color: var(--green); }
    .stat-pill-value.yellow { color: var(--yellow); }
    .stat-pill-sub {
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    /* ─── RESULTS ─── */
    .results-section {
      padding-left: 34px;
      margin-top: 28px;
    }
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .results-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
    }
    .inline-filters {
      display: flex;
      gap: 4px;
    }
    .inline-filter {
      font-size: 0.76rem;
      padding: 4px 10px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-xs);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
    }
    .inline-filter.active {
      background: var(--surface);
      color: var(--text);
    }
    .inline-filter:hover:not(.active) {
      color: var(--text-secondary);
    }
    .results-list {
      display: grid;
      gap: 8px;
    }

    /* ─── RESULT CARD ─── */
    .result-card {
      display: flex;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: all var(--transition);
      animation: cardIn 0.35s ease backwards;
      cursor: pointer;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-card:hover {
      border-color: var(--border-light);
      background: var(--surface-2);
    }
    .result-img {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-xs);
      background: var(--border);
      flex-shrink: 0;
      object-fit: cover;
    }
    .result-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }
    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .result-info { min-width: 0; }
    .result-name {
      font-size: 0.86rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
    }
    .result-seller {
      font-size: 0.76rem;
      color: var(--text-dim);
    }
    .result-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    .platform-badge {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .platform-weidian { background: #162D40; color: #6BAED6; }
    .platform-taobao  { background: #2D1818; color: #E8715A; }
    .platform-1688    { background: #182018; color: #6BAA6B; }

    .result-price {
      text-align: right;
      flex-shrink: 0;
    }
    .price-main {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .price-cny {
      font-size: 0.68rem;
      color: var(--text-dim);
    }
    .result-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .agent-btn {
      flex: 1;
      font-size: 0.73rem;
      font-weight: 600;
      padding: 6px 0;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
    }
    .agent-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ─── QUALITY ─── */
    .quality {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .quality-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .quality-good .quality-dot { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.4); }
    .quality-ok .quality-dot { background: var(--yellow); }
    .quality-risky .quality-dot { background: var(--red); }
    .quality-good { color: var(--green); }
    .quality-ok { color: var(--yellow); }
    .quality-risky { color: var(--red); }

    /* ─── FOLLOW-UPS ─── */
    .follow-ups {
      padding-left: 34px;
      margin-top: 28px;
    }
    .follow-up-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .follow-up-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .follow-up-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 450;
    }
    .follow-up-chip:hover {
      background: var(--surface-2);
      border-color: var(--border-light);
      color: var(--text);
    }

    /* ─── DOCKED INPUT ─── */
    .docked-input {
      position: fixed;
      bottom: 0;
      left: 260px;
      right: 0;
      padding: 16px 24px 20px;
      background: linear-gradient(to top, var(--bg) 50%, transparent);
      display: none;
      z-index: 50;
    }
    .docked-input.show { display: flex; }
    .docked-input-inner {
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      color: var(--text);

      border-radius: var(--radius-pill);

<script>
// ════════════════════════════════════════════════
// repfind — Premium AI Search UX
// ════════════════════════════════════════════════

const AGENTS = {
  kakobuy: { name: 'KakoBuy' },
  cnfans:  { name: 'CNFans' },
  oopbuy:  { name: 'Oopbuy' },
};
const PLATFORMS = {
  weidian: { label: 'Weidian', class: 'platform-weidian' },
  taobao:  { label: 'Taobao',  class: 'platform-taobao' },
  '1688':  { label: '1688',    class: 'platform-1688' },
};

// ─── Webhook config ───
const WEBHOOK_URL = 'https://n8n.wildeautomations.com/webhook/repfind-chat';

let searchHistory = [];
let currentPlatform = 'all';
let isSearching = false;
let chatHistory = []; // conversation context for AI
let sessionId = sessionStorage.getItem('repfind_session') || ('sess_' + Math.random().toString(36).substr(2, 12) + Date.now().toString(36));
sessionStorage.setItem('repfind_session', sessionId);

// ─── DOM refs ───
const mainInput = document.getElementById('searchInput');
const mainSend = document.getElementById('sendBtn');
const dockedInputEl = document.getElementById('dockedSearchInput');
const dockedSend = document.getElementById('dockedSendBtn');

mainInput.addEventListener('input', () => mainSend.disabled = !mainInput.value.trim());
dockedInputEl.addEventListener('input', () => dockedSend.disabled = !dockedInputEl.value.trim());
mainInput.addEventListener('keydown', e => { if (e.key === 'Enter' && mainInput.value.trim()) doSearch(); });
dockedInputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && dockedInputEl.value.trim()) doSearch(true); });

// ─── Toast ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Sidebar ───
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

function newSearch() {
  document.getElementById('welcome').classList.remove('hide');
  document.getElementById('chatArea').classList.remove('show');
  document.getElementById('dockedInput').classList.remove('show');
  document.getElementById('topbar').classList.remove('show');
  mainInput.value = '';
  mainInput.focus();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  chatHistory = []; // reset conversation
  document.getElementById('chatInner').innerHTML = ''; // clear messages
}

function quickSearch(q) { mainInput.value = q; doSearch(); }
function getQuery() {
  return (dockedInputEl.value.trim()) || mainInput.value.trim();
}

// ════════════════════════════════════════════════
// SEARCH FLOW
// ════════════════════════════════════════════════
async function doSearch(fromDocked) {
  if (isSearching) return;
  const query = getQuery();
  if (!query) return;
  isSearching = true;

  // Transition from welcome to chat view
  document.getElementById('welcome').classList.add('hide');
  document.getElementById('chatArea').classList.add('show');
  document.getElementById('dockedInput').classList.add('show');
  document.getElementById('topbar').classList.add('show');

  const inner = document.getElementById('chatInner');

  // User query bubble
  const userBubble = document.createElement('div');
  userBubble.className = 'query-bubble';
  userBubble.innerHTML = `<span>${escapeHtml(query)}</span>`;
  inner.appendChild(userBubble);

  // Loading indicator
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'ai-response';
  loadingDiv.id = 'loadingSection';
  loadingDiv.innerHTML = `
    <div class="loading-header">
      <div class="avatar">r</div>
      <span class="bot-name">repfind <span class="badge">AI</span></span>
    </div>
    <div class="loading-steps">
      <div class="step-list" id="stepList">
        <div class="step-item active" data-step="0" style="animation-delay:0s">
          <div class="step-check spinner-mini" id="check0"></div>
          <span>Thinking...</span>
        </div>
      </div>
    </div>
  `;
  inner.appendChild(loadingDiv);
  scrollToBottom();

  // Clear inputs
  dockedInputEl.value = '';
  mainInput.value = '';
  mainSend.disabled = true;
  dockedSend.disabled = true;

  // ─── Call the AI webhook ───
  try {
    const response = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: query,
        history: chatHistory.slice(-10),
        session_id: sessionId
      })
    });

    const ai = await response.json();

    // Update conversation history
    chatHistory.push({ role: 'user', content: query });
    chatHistory.push({ role: 'assistant', content: ai.reply });

    // Remove loading
    document.getElementById('loadingSection').remove();

    if (ai.action === 'search' && ai.search_query) {
      // AI says search — show results with the refined query
      renderSearchResponse(ai, inner);
    } else {
      // Clarify — conversational reply with chips
      renderChatResponse(ai, inner);
    }

    addHistory(query);
  } catch (err) {
    console.error('Webhook error:', err);
    document.getElementById('loadingSection').remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'ai-response';
    errDiv.innerHTML = `
      <div class="verdict-header">
        <div class="avatar">r</div>
        <span class="bot-name">repfind <span class="badge">AI</span></span>
      </div>
      <div class="verdict-text">Connection issue. Try again?</div>
    `;
    inner.appendChild(errDiv);
  }

  isSearching = false;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

function updateStep(step) {
  const stepEl = document.querySelector(`[data-step="${step}"]`);
  const checkEl = document.getElementById(`check${step}`);
  if (!stepEl || !checkEl) return;

  // Mark previous as done
  if (step > 0) {
    const prevEl = document.querySelector(`[data-step="${step - 1}"]`);
    const prevCheck = document.getElementById(`check${step - 1}`);
    if (prevEl) { prevEl.classList.remove('active'); prevEl.classList.add('done'); prevEl.style.opacity = '0.5'; }
    if (prevCheck) {
      prevCheck.classList.remove('spinner-mini');
      prevCheck.classList.add('done');
      prevCheck.innerHTML = '<svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5"><path d="M2 6l3 3 5-6"/></svg>';
    }
  }

  // Activate current
  stepEl.classList.add('active');
  stepEl.style.opacity = '1';
  checkEl.classList.add('spinner-mini');
}

// ════════════════════════════════════════════════
// RENDER — CONVERSATIONAL (clarify)
// ════════════════════════════════════════════════
function renderChatResponse(ai, container) {
  const responseDiv = document.createElement('div');
  responseDiv.className = 'ai-response';

  const chipsHTML = (ai.chips && ai.chips.length)
    ? `<div class="follow-ups" style="display:block;margin-top:12px">
         <div class="follow-up-chips" id="chatChips-${Date.now()}">

  responseDiv.innerHTML = `

  container.appendChild(responseDiv);

  // Stream the reply text
  const textEl = responseDiv.querySelector('.verdict-text');
  streamText(textEl, ai.reply, () => scrollToBottom());
  scrollToBottom();
}

// ════════════════════════════════════════════════

// ════════════════════════════════════════════════
function renderSearchResponse(ai, container) {
  const query = ai.search_query;

  const responseDiv = document.createElement('div');
  responseDiv.className = 'ai-response';

    <div class="action-bar" id="actionBar" style="display:none">
      <button class="action-btn" onclick="copyVerdict()" title="Copy verdict">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <button class="action-btn" onclick="regenerateSearch()" title="Search again">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh
      </button>
      <button class="action-btn" onclick="showToast('Link copied to clipboard')" title="Share">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        Share
      </button>
    </div>
    <div class="provenance" id="provenance" style="display:none">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span>Sourced from <strong style="color:var(--text-muted)">${results.length} sellers</strong></span>
      <span class="dot-sep"></span>
      <span>${new Set(results.map(r => r.platform)).size} platforms</span>
      <span class="dot-sep"></span>

    <div class="results-section" id="resultsSection" style="display:none">

  container.appendChild(responseDiv);

  // Stream the AI reply first, then results
  streamText(document.getElementById('verdictText'), ai.reply, () => {
    // Show search stats after reply
    showStats(verdict.stats);
    setTimeout(() => {
      document.getElementById('actionBar').style.display = 'flex';
      document.getElementById('provenance').style.display = 'flex';
      renderResults(results);
      wireFilters();
      renderFollowUps(query);
      scrollToBottom();
    }, 300);
  });
}

// ─── Stream text ───
function streamText(el, html, callback) {
  const tokens = [];
  let i = 0;
  while (i < html.length) {
    if (html[i] === '<') {
      const end = html.indexOf('>', i);
      tokens.push({ tag: true, text: html.slice(i, end + 1) });
      i = end + 1;
    } else {
      tokens.push({ tag: false, text: html[i] });
      i++;
    }
  }

  el.innerHTML = '';
  let idx = 0;
  let displayed = '';

  function tick() {
    if (idx >= tokens.length) {
      el.innerHTML = displayed;
      if (callback) setTimeout(callback, 200);
      return;
    }
    const token = tokens[idx];
    if (token.tag) {
      displayed += token.text;
      idx++;
      tick();
    } else {
      displayed += token.text;
      idx++;
      el.innerHTML = displayed + '<span class="cursor-blink"></span>';
      setTimeout(tick, 15 + Math.random() * 25);
    }
    scrollToBottom();
  }
  tick();
}

// ─── Stats ───
function showStats(stats) {
  const el = document.getElementById('statPills');
  if (!el) return;
  el.innerHTML = stats.map((s, i) => {
    const iconClass = s.label.toLowerCase().includes('price') ? 'price' :
                      s.label.toLowerCase().includes('range') ? 'range' : 'legit';
    const icon = iconClass === 'price' ? '¥' : iconClass === 'range' ? '↔' : '✓';
    return `<div class="stat-pill" style="animation:cardIn 0.3s ease backwards;animation-delay:${i*0.12}s">
      <div class="stat-pill-icon ${iconClass}">${icon}</div>
      <div class="stat-pill-content">
        <span class="stat-pill-label">${s.label}</span>
        <span class="stat-pill-value ${s.class}">${s.value}</span>
        ${s.sub ? `<span class="stat-pill-sub">${s.sub}</span>` : ''}
      </div>
    </div>`;
  }).join('');
  el.style.display = 'flex';
}

// ─── Results ───
function renderResults(results) {
  const list = document.getElementById('resultsList');
  const section = document.getElementById('resultsSection');
  if (!list || !section) return;
  section.style.display = 'block';
  list.innerHTML = '';
  results.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.dataset.platform = r.platform;
    card.style.animationDelay = `${i * 0.08}s`;
    card.innerHTML = renderCardHTML(r);
    list.appendChild(card);
  });
  scrollToBottom();
}

function renderCardHTML(r) {
  const qClass = r.quality === 'good' ? 'quality-good' : r.quality === 'ok' ? 'quality-ok' : 'quality-risky';
  const qLabel = r.quality === 'good' ? 'Legit' : r.quality === 'ok' ? 'OK' : 'Risky';
  const plat = PLATFORMS[r.platform];
  const agentBtns = Object.entries(AGENTS).map(([key, agent]) =>
    `<button class="agent-btn" onclick="event.stopPropagation();sendToAgent('${key}', '${r.id}', this)">${agent.name}</button>`
  ).join('');

  return `
    <img class="result-img" src="${r.img}" alt="${escapeAttr(r.name)}" loading="lazy" onerror="this.style.opacity=0">
    <div class="result-body">
      <div class="result-top">
        <div class="result-info">
          <div class="result-name">${escapeHtml(r.name)}</div>
          <div class="result-seller">${escapeHtml(r.seller)} · ⭐ ${r.rating} · ${r.sales.toLocaleString()} sold</div>
          <div class="result-meta">
            <span class="platform-badge ${plat.class}">${plat.label}</span>
            <span class="quality ${qClass}"><span class="quality-dot"></span>${qLabel}</span>
          </div>
        </div>
        <div class="result-price">
          <div class="price-main">¥${r.priceCNY}</div>
          <div class="price-cny">$${r.priceUSD}</div>
        </div>
      </div>
      <div class="result-actions">${agentBtns}</div>
    </div>
  `;
}

// ─── Send to agent ───
function sendToAgent(agentKey, resultId, btn) {
  const original = btn.textContent;
  btn.textContent = 'Opening...';
  btn.style.background = 'var(--accent)';
  btn.style.borderColor = 'var(--accent)';
  btn.style.color = 'white';
  setTimeout(() => {
    btn.textContent = '✓ Copied';
    showToast(`Product link copied for ${AGENTS[agentKey].name}`);
    setTimeout(() => {
      btn.textContent = original;
      btn.style.cssText = '';
    }, 1400);
  }, 500);
}

// ─── Copy verdict ───
function copyVerdict() {
  const text = document.getElementById('verdictText').textContent.trim();
  navigator.clipboard?.writeText(text);
  showToast('Verdict copied');
}

// ─── Regenerate ───
function regenerateSearch() {
  const last = searchHistory[0];
  if (last) {
    mainInput.value = last;
    doSearch();
  }
}

// ─── Follow-ups ───
function renderFollowUps(query) {
  const el = document.getElementById('followUpChips');
  const section = document.getElementById('followUps');
  if (!el || !section) return;
  const suggestions = [
    `${query} QC review`,
    `${query} best batch`,
    `${query} vs retail`,
    `Cheap ${query}`,
  ];
  el.innerHTML = suggestions.map(s =>
    `<div class="follow-up-chip" onclick="quickSearch('${escapeAttr(s)}')">${escapeHtml(s)}</div>`
  ).join('');
  section.style.display = 'block';
}

// ─── Filters ───
function wireFilters() {
  document.querySelectorAll('.inline-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.inline-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPlatform = btn.dataset.platform;
      applyFilter(currentPlatform);
    });
  });
}
function applyFilter(platform) {
  document.querySelectorAll('.result-card').forEach(card => {
    card.style.display = (platform === 'all' || card.dataset.platform === platform) ? '' : 'none';
  });
}

// ─── History ───
function addHistory(query) {
  if (searchHistory[0] === query) return;
  searchHistory = [query, ...searchHistory.filter(q => q !== query)].slice(0, 10);
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  if (searchHistory.length === 0) {
    el.innerHTML = '<div class="history-item" style="opacity:0.5;cursor:default;">No searches yet</div>';
    return;
  }
  el.innerHTML = '';
  searchHistory.forEach(q => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><span>${escapeHtml(q)}</span>`;
    item.onclick = () => { mainInput.value = q; doSearch(); };
    el.appendChild(item);
  });
}

// ─── Utils ───
function scrollToBottom() {
  const area = document.getElementById('chatArea');
  if (area) area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) { return escapeHtml(str).replace(/"/g, '&quot;'); }

// ════════════════════════════════════════════════
// MOCK DATA
// ════════════════════════════════════════════════
function generateResults(query) {
  const seed = query.toLowerCase();
  const basePrice = 50 + (seed.length % 10) * 8;
  const sellers = [
    { name: 'TopLux Store', rating: 4.8, sales: 3200, rep: 'good', platform: 'weidian' },
    { name: 'Factory Direct 厂家直销', rating: 4.6, sales: 1800, rep: 'good', platform: 'weidian' },
    { name: 'Fashion Hub 潮流馆', rating: 4.3, sales: 950, rep: 'ok', platform: 'taobao' },
    { name: 'Bargain Deals 88', rating: 3.9, sales: 450, rep: 'risky', platform: 'taobao' },
    { name: 'Wholesale Supply 鹏程', rating: 4.5, sales: 5200, rep: 'good', platform: '1688' },
    {0: 'QuickShip Store', rating: 4.1, sales: 680, rep: 'ok', platform: 'weidian'},
  ];
  return sellers.map((s, i) => {
    const variance = 0.7 + (i * 0.12) + (Math.sin(seed.length + i) * 0.1);
    const priceCNY = Math.round((basePrice * variance) / 5) * 5;
    const priceUSD = (priceCNY / 7.25).toFixed(2);
    return {
      id: `${s.platform}-${i}-${Date.now()}`,
      name: `${query.charAt(0).toUpperCase() + query.slice(1)} — Batch ${['A','B','C','D','E','F'][i]}`,
      seller: s.name || s[0],
      rating: s.rating,
      sales: s.sales,
      platform: s.platform,
      priceCNY, priceUSD,
      quality: s.rep,
      img: `https://picsum.photos/seed/${encodeURIComponent(seed + i)}/100/100`,
    };
  });
}

function generateVerdict(query, results) {
  const prices = results.map(r => r.priceCNY);
  const avg = Math.round(prices.reduce((a,b) => a+b, 0) / prices.length);
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const goodCount = results.filter(r => r.quality === 'good').length;
  const okCount = results.filter(r => r.quality === 'ok').length;
  const riskyCount = results.filter(r => r.quality === 'risky').length;
  const avgUSD = (avg / 7.25).toFixed(2);

  let verdict;
  if (goodCount >= 3) {
    verdict = `Found <strong>${goodCount} legit sellers</strong> with solid ratings and real sales volume. The market for "${escapeHtml(query)}" is healthy — avg price is <strong>¥${avg} ($${avgUSD})</strong> and you've got plenty of options.`;
  } else if (goodCount >= 1) {
    verdict = `Mixed results. <strong>${goodCount} sellers</strong> look trustworthy, ${okCount + riskyCount} are questionable. Avg price is <strong>¥${avg} ($${avgUSD})</strong> — stick to the green-rated ones below.`;
  } else {
    verdict = `Most results for "${escapeHtml(query)}" look risky. Low sales, poor ratings. Avg price is <strong>¥${avg} ($${avgUSD})</strong>. Proceed with caution — check QC pics before committing.`;
  }

  return {
    verdict,
    stats: [
      { label: 'Avg Price', value: `¥${avg}`, sub: `$${avgUSD}`, class: 'accent' },
      { label: 'Price Range', value: `¥${min}–${max}`, class: '' },
      { label: 'Legit Sellers', value: `${goodCount}/${results.length}`, class: goodCount >= 3 ? 'green' : goodCount >= 1 ? 'yellow' : '' },
    ],
  };
}

mainInput.focus();
</script>
