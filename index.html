  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ChatGPT-inspired dark palette */
      --bg: #1A1A1A;
      --bg-deep: #131313;
      --bg-sidebar: #0F0F0F;
      --surface: #242424;
      --surface-2: #2E2E2E;
      --surface-hover: #343434;
      --border: #2A2A2A;
      --border-light: #383838;
      --text: #F5F5F5;
      --text-secondary: #C5C5C5;
      --text-muted: #888888;
      --text-dim: #5A5A5A;
      --accent: #C84B2F;
      --accent-light: #E8624A;
      --accent-dim: rgba(200, 75, 47, 0.10);
      --accent-subtle: rgba(200, 75, 47, 0.06);
      --green: #34D399;
      --yellow: #FBBF24;
      --red: #F87171;
      --blue: #60A5FA;
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --radius-pill: 100px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    /* ─── FONT RENDERING ─── */
    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
      letter-spacing: -0.011em;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* ─── SIDEBAR ─── */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 10px;
      z-index: 100;
      transition: transform var(--transition);
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      margin-bottom: 18px;
    }
    .sidebar-logo {
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-logo img {
      height: 40px;
      width: auto;
    }
    .sidebar-logo .find { color: var(--accent); }
    .new-search-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 450;
      cursor: pointer;
      transition: all var(--transition);
      width: 100%;
      text-align: left;
    }
    .new-search-btn:hover {
      background: var(--surface);
      color: var(--text);
    }
    .new-search-btn svg {
      opacity: 0.7;
      flex-shrink: 0;
    }
    .sidebar-section {
      margin-top: 20px;
    }
    .history-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      padding: 4px 12px 6px;
      letter-spacing: 0.02em;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item:hover {
      background: var(--surface);
      color: var(--text);
    }
    .history-item svg {
      opacity: 0.4;
      flex-shrink: 0;
    }
    .sidebar-footer {
      margin-top: auto;
      padding: 12px 8px 4px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer-link {
      display: block;
      font-size: 0.75rem;
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: var(--radius-xs);
      transition: color var(--transition);
    }
    .sidebar-footer-link:hover { color: var(--text-muted); }

    /* ─── MAIN ─── */
    .main {
      margin-left: 260px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: margin var(--transition);
    }

    /* ─── TOP BAR ─── */
    .topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(26, 26, 26, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 40;
    }
    .topbar.show { display: flex; }
    .topbar-logo {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }
    .topbar-logo .find { color: var(--accent); }
    .topbar-right {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .topbar-btn {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: var(--radius-xs);
      transition: all var(--transition);
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: none;
    }
    .topbar-btn:hover {
      color: var(--text);
      background: var(--surface);
    }

    /* ─── WELCOME ─── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      min-height: calc(100vh - 50px);
    }
    .welcome.hide { display: none; }
    .welcome-logo {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .welcome-logo img {
      height: 96px;
      width: auto;
    }
    .welcome-logo .find { color: var(--accent); }
    .topbar-logo img { height: 32px; width: auto; vertical-align: middle; }
    .welcome-tagline {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      max-width: 420px;
      text-align: center;
      line-height: 1.5;
    }

    /* ─── PROMPT ─── */
    .prompt-container {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }
    .prompt-box {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 8px 8px 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color var(--transition), box-shadow var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .prompt-box:focus-within {
      border-color: var(--text-dim);
      box-shadow: 0 0 0 1px var(--text-dim), var(--shadow-md);
    }
    .prompt-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      padding: 12px 0;
    }
    .prompt-box input::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--text);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .send-btn:disabled {
      background: var(--border-light);
      color: var(--text-dim);
      cursor: not-allowed;
    }
    .send-btn:not(:disabled):hover {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
    }

    /* ─── SUGGESTIONS ─── */
    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }
    .suggestion {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 450;
    }
    .suggestion:hover {
      background: var(--surface-2);
      border-color: var(--border-light);
      color: var(--text);
      transform: translateY(-1px);
    }
    .suggestion-icon {
      font-size: 0.95rem;
      filter: grayscale(1) brightness(2);
    }

    /* ─── CHAT AREA ─── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 200px;
      display: none;
    }
    .chat-area.show { display: block; }
    .chat-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ─── QUERY BUBBLE ─── */
    .query-bubble {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
      animation: fadeInUp 0.3s ease;
    }
    .query-bubble span {
      background: var(--surface-2);
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font-size: 0.88rem;
      font-weight: 500;
      max-width: 80%;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── AI RESPONSE ─── */
    .ai-response { animation: fadeInUp 0.4s ease; }

    /* ─── TYPING / LOADING STEPS ─── */
    .loading-steps {
      padding: 4px 0 8px;
    }
    .loading-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #9B3A24);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }
    .bot-name {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .bot-name .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--accent-dim);
      color: var(--accent-light);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .step-list {
      padding-left: 34px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-dim);
      animation: fadeInUp 0.3s ease backwards;
    }
    .step-check {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    .step-check.done {
      background: var(--green);
      border-color: var(--green);
    }
    .step-check.done svg {
      opacity: 1;
    }
    .step-check svg {
      width: 8px;
      height: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .step-check.spinner-mini {
      border: 1.5px solid var(--border-light);
      border-top-color: var(--accent);
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step-item.done { color: var(--text-muted); }
    .step-item.active { color: var(--text-secondary); }

    /* ─── VERDICT ─── */
    .verdict-block {
      margin-bottom: 20px;
    }
    .verdict-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .verdict-text {
      font-size: 0.94rem;
      line-height: 1.7;
      color: var(--text);
      padding-left: 34px;
      letter-spacing: -0.005em;
    }
    .verdict-text strong { font-weight: 700; }
    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ─── ACTION BAR ─── */
    .action-bar {
      display: flex;
      gap: 4px;
      padding-left: 34px;
      margin-top: 14px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.2s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all var(--transition);
    }
    .action-btn:hover {
      background: var(--surface);
      color: var(--text-secondary);
    }
    .action-btn svg {
      opacity: 0.7;
    }

    /* ─── PROVENANCE ─── */
    .provenance {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 34px;
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .provenance .dot-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-dim);
      opacity: 0.5;
    }

    /* ─── STAT PILLS ─── */
    .stat-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-left: 34px;
      margin-top: 16px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      transition: border-color var(--transition);
    }
    .stat-pill:hover {
      border-color: var(--border-light);
    }
    .stat-pill-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .stat-pill-icon.price { background: var(--accent-dim); color: var(--accent-light); }
    .stat-pill-icon.range { background: rgba(96,165,250,0.1); color: var(--blue); }
    .stat-pill-icon.legit { background: rgba(52,211,153,0.1); color: var(--green); }
    .stat-pill-content {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .stat-pill-label {
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      font-weight: 600;
    }
    .stat-pill-value {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .stat-pill-value.accent { color: var(--accent-light); }
    .stat-pill-value.green { color: var(--green); }
    .stat-pill-value.yellow { color: var(--yellow); }
    .stat-pill-sub {
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    /* ─── RESULTS ─── */
    .results-section {
      padding-left: 34px;
      margin-top: 28px;
    }
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      padding: 8px 0;
    }
    .results-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
    }
    .inline-filters {
      display: flex;
      gap: 4px;
    }
    .inline-filter {
      font-size: 0.76rem;
      padding: 4px 10px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-xs);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
    }
    .inline-filter.active {
      background: var(--surface);
      color: var(--text);
    }
    .inline-filter:hover:not(.active) {
      color: var(--text-secondary);
    }
    .results-list {
      display: grid;
      gap: 8px;
    }

    /* ─── RESULT CARD ─── */
    .result-card {
      display: flex;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: all var(--transition);
      animation: cardIn 0.35s ease backwards;
      cursor: pointer;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-card:hover {
      border-color: var(--border-light);
      background: var(--surface-2);
    }
    .result-img {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-xs);
      background: var(--border);
      flex-shrink: 0;
      object-fit: cover;
    }
    .result-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }
    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .result-info { min-width: 0; }
    .result-name {
      font-size: 0.86rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
    }
    .result-seller {
      font-size: 0.76rem;
      color: var(--text-dim);
    }
    .result-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    .platform-badge {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .platform-weidian { background: #162D40; color: #6BAED6; }
    .platform-taobao  { background: #2D1818; color: #E8715A; }
    .platform-1688    { background: #182018; color: #6BAA6B; }

    .result-price {
      text-align: right;
      flex-shrink: 0;
    }
    .price-main {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .price-cny {
      font-size: 0.68rem;
      color: var(--text-dim);
    }
    .currency-switcher { display: flex; gap: 2px; margin-left: auto; }
    .currency-btn {
      font-size: 0.65rem; font-weight: 700; padding: 3px 7px;
      border-radius: var(--radius-xs); border: 1px solid transparent;
      background: transparent; color: var(--text-dim); cursor: pointer;
      transition: all var(--transition);
    }
    .currency-btn:hover { color: var(--text-muted); }
    .currency-btn.active { background: var(--surface-3); color: var(--accent); border-color: var(--border-light); }
    .result-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .buy-btn {
      flex: 1;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 8px 0;
      border-radius: var(--radius-xs);

    /* ─── AGENT TOGGLE ─── */
    .agent-toggle {

    }

    .agent-toggle-btn .agent-dot.on { opacity: 1; }

    /* ─── VERIFIED BADGE ─── */
    .verified-badge {

    /* ─── PRICE CONTEXT ─── */

    /* ─── SKELETON CARDS ─── */
    @keyframes shimmer {

    .skeleton-card {

    /* ─── FOLLOW-UPS ─── */

    .toast {

      bottom: 100px;

    .badge-best-value { background:rgba(200,75,47,0.15); color:var(--accent-light); border:1px solid rgba(200,75,47,0.3); }

    .badge-best-seller { background:rgba(251,191,36,0.12); color:var(--yellow); border:1px solid rgba(251,191,36,0.25); }
    .badge-lowest-price { background:rgba(96,165,250,0.12); color:var(--blue); border:1px solid rgba(96,165,250,0.25); }
    .badge-warn { background:rgba(248,113,113,0.1); color:var(--red); border:1px solid rgba(248,113,113,0.2); }

    /* ─── REFINEMENT ─── */
    .refinement-hint { padding-left:34px; margin-top:12px; font-size:0.72rem; color:var(--text-dim); display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .refinement-chip { font-size:0.7rem; padding:3px 8px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xs); color:var(--text-muted); cursor:pointer; transition:all var(--transition); }
    .refinement-chip:hover { background:var(--surface-2); color:var(--text); border-color:var(--border-light); }

    /* ─── AI INSIGHTS ─── */
    .ai-insight { padding-left:34px; margin-top:16px; display:flex; flex-direction:column; gap:6px; }
    .insight-row { display:flex; align-items:flex-start; gap:8px; font-size:0.8rem; color:var(--text-secondary); line-height:1.5; }

    .insight-icon.pick { color:var(--accent-light); } .insight-icon.warn { color:var(--red); } .insight-icon.info { color:var(--blue); } .insight-icon.deal { color:var(--green); }
    .insight-row strong { color:var(--text); }
  </style>
</head>

<script>
// ════════════════════════════════════════════════
// repfind — Premium AI Search UX
// ════════════════════════════════════════════════

const AFFILIATE_CODES = {
  kakobuy: 'cq43b',
  oopbuy:  '2TRZU7BH3',
  cnfans:  '1243144',
};

const AGENTS = {
  kakobuy: { name: 'KakoBuy', color: '#C84B2F' },
  oopbuy:  { name: 'Oopbuy',  color: '#60A5FA' },
  cnfans:  { name: 'CNFans',  color: '#34D399' },
};

// ─── Agent Selection (user picks which sites to buy from) ───
let selectedAgents = JSON.parse(localStorage.getItem('repfind_agents') || '["kakobuy"]');

function getSelectedAgents() {
  return selectedAgents.length > 0 ? selectedAgents : ['kakobuy'];
}

function toggleAgent(key) {
  if (selectedAgents.includes(key)) {
    if (selectedAgents.length > 1) selectedAgents = selectedAgents.filter(a => a !== key);
  } else {
    selectedAgents.push(key);
  }
  localStorage.setItem('repfind_agents', JSON.stringify(selectedAgents));
  updateAgentToggleUI();
  // Re-render current results
  if (currentResults.length) {
    const allLists = document.querySelectorAll('#resultsList');
    const list = allLists[allLists.length - 1];
    if (list) {
      list.innerHTML = '';
      baseResults.forEach((r, i) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.dataset.platform = r.platform;
        card.style.animationDelay = `${Math.min(i * 0.04, 0.3)}s`;
        card.innerHTML = renderCardHTML(r, i);
        list.appendChild(card);
      });
    }
  }
}

function updateAgentToggleUI() {
  document.querySelectorAll('.agent-toggle-btn').forEach(btn => {
    const key = btn.dataset.agent;
    const dot = btn.querySelector('.agent-dot');
    if (selectedAgents.includes(key)) {
      btn.classList.add('active');
      if (dot) { dot.classList.add('on'); dot.classList.remove('off'); }
    } else {
      btn.classList.remove('active');
      if (dot) { dot.classList.add('off'); dot.classList.remove('on'); }
    }
  });
}

function renderAgentToggleHTML() {
  const buttons = Object.entries(AGENTS).map(([key, agent]) => {
    const active = selectedAgents.includes(key);
    return `<button class="agent-toggle-btn ${active ? 'active' : ''}" data-agent="${key}" onclick="toggleAgent('${key}')">
      <span class="agent-dot ${active ? 'on' : 'off'}" style="background:${agent.color}"></span>
      ${agent.name}
    </button>`;
  }).join('');
  return `<div class="agent-toggle"><span class="agent-toggle-label">Order from:</span>${buttons}</div>`;
}

// ─── Currency conversion ───
const EXCHANGE_RATES = { CNY: 1, USD: 0.14, CAD: 0.19, AUD: 0.21, EUR: 0.13 };
const CURRENCY_SYMBOLS = { CNY: '¥', USD: '$', CAD: 'C$', AUD: 'A$', EUR: '€' };
let currentCurrency = localStorage.getItem('repfind_currency') || 'USD';
function convertPrice(cny, currency) {
  if (!cny || cny <= 0) return null;
  return cny * (EXCHANGE_RATES[currency] || EXCHANGE_RATES.USD);
}
function formatPrice(cny, currency) {
  const v = convertPrice(cny, currency);
  if (v === null) return '';
  return (CURRENCY_SYMBOLS[currency] || '$') + v.toFixed(2);
}
function setCurrency(curr) {
  currentCurrency = curr;
  localStorage.setItem('repfind_currency', curr);
  document.querySelectorAll('[data-price-cny]').forEach(el => {
    const cny = parseFloat(el.dataset.priceCny);
    el.querySelector('.price-main').textContent = formatPrice(cny, currentCurrency);
    el.querySelector('.price-cny').textContent = currentCurrency;
  });
  document.querySelectorAll('.currency-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.currency === curr);
  });
}

// ─── Affiliate Link Builder ───
// BS-code products now have real Weidian item IDs — use direct product links.
// FI-code products (no real ID) fall back to search by name.
function buildAgentLink(agentKey, product) {
  const id = product.id || product.itemID;
  const name = encodeURIComponent(product.name || id || 'rep');
  const ref = AFFILIATE_CODES[agentKey];

  // If we have a numeric Weidian ID, build direct product links
  if (id && /^\d+$/.test(id)) {
    const sourceUrl = `https://weidian.com/item.html?itemID=${id}`;
    switch(agentKey) {
      case 'cnfans':
        return `https://cnfans.com/product?platform=WEIDIAN&id=${id}&ref=${ref}`;
      case 'kakobuy':
        return `https://www.kakobuy.com/item/details?url=${encodeURIComponent(sourceUrl)}&source=WD&affcode=${ref}`;
      case 'oopbuy':
        return `https://oopbuy.com/product/weidian/${id}?inviteCode=${ref}`;
      default:
        return '#';
    }
  }

  // No real ID — use search with product name
  switch(agentKey) {
    case 'cnfans':
      return `https://cnfans.com/search?keyword=${name}&ref=${ref}`;
    case 'kakobuy':
      return `https://www.kakobuy.com/search?q=${name}&affcode=${ref}`;
    case 'oopbuy':
      return `https://oopbuy.com/search?q=${name}&inviteCode=${ref}`;
    default:
      return '#';
  }
}
const PLATFORMS = {
  weidian: { label: 'Weidian', class: 'platform-weidian' },
  taobao:  { label: 'Taobao',  class: 'platform-taobao' },
  '1688':  { label: '1688',    class: 'platform-1688' },
};

// ─── Webhook config ───
const WEBHOOK_URL = 'https://n8n.wildeautomations.com/webhook/repfind-chat';

let searchHistory = [];
let currentPlatform = 'all';
let isSearching = false;
let chatHistory = []; // conversation context for AI
let currentResults = []; // current search results for export
let lastSearchQuery = ''; // last query for export naming
let sessionId = sessionStorage.getItem('repfind_session') || ('sess_' + Math.random().toString(36).substr(2, 12) + Date.now().toString(36));
sessionStorage.setItem('repfind_session', sessionId);

// ─── DOM refs ───
const mainInput = document.getElementById('searchInput');
const mainSend = document.getElementById('sendBtn');
const dockedInputEl = document.getElementById('dockedSearchInput');
const dockedSend = document.getElementById('dockedSendBtn');

mainInput.addEventListener('input', () => mainSend.disabled = !mainInput.value.trim());
dockedInputEl.addEventListener('input', () => dockedSend.disabled = !dockedInputEl.value.trim());
mainInput.addEventListener('keydown', e => { if (e.key === 'Enter' && mainInput.value.trim()) doSearch(); });
dockedInputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && dockedInputEl.value.trim()) doSearch(true); });

// ─── Toast ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Sidebar ───
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

function newSearch() {
  document.getElementById('welcome').classList.remove('hide');
  document.getElementById('chatArea').classList.remove('show');
  document.getElementById('dockedInput').classList.remove('show');
  document.getElementById('topbar').classList.remove('show');
  mainInput.value = '';
  document.querySelectorAll('.currency-btn').forEach(b => {
  b.classList.toggle('active', b.dataset.currency === currentCurrency);
});
mainInput.focus();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  chatHistory = []; // reset conversation

function updateStep(step) {
  const stepEl = document.querySelector(`[data-step="${step}"]`);
  const checkEl = document.getElementById(`check${step}`);
  if (!stepEl || !checkEl) return;

  // Mark previous as done
  if (step > 0) {
    const prevEl = document.querySelector(`[data-step="${step - 1}"]`);
    const prevCheck = document.getElementById(`check${step - 1}`);
    if (prevEl) { prevEl.classList.remove('active'); prevEl.classList.add('done'); prevEl.style.opacity = '0.5'; }
    if (prevCheck) {
      prevCheck.classList.remove('spinner-mini');
      prevCheck.classList.add('done');
      prevCheck.innerHTML = '<svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5"><path d="M2 6l3 3 5-6"/></svg>';
    }
  }

  // Activate current
  stepEl.classList.add('active');
  stepEl.style.opacity = '1';
  checkEl.classList.add('spinner-mini');
}

function updateLoadingStep(step, text) {
  if (!document.getElementById('loadingSection')) return;
  const stepList = document.getElementById('stepList');
  if (!stepList) return;
  if (step > 0) {
    const prevEl = document.querySelector(`[data-step="${step - 1}"]`);
    const prevCheck = document.getElementById(`check${step - 1}`);
    if (prevEl) { prevEl.classList.remove('active'); prevEl.classList.add('done'); prevEl.style.opacity = '0.5'; }
    if (prevCheck) { prevCheck.classList.remove('spinner-mini'); prevCheck.classList.add('done'); prevCheck.innerHTML = '<svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5"><path d="M2 6l3 3 5-6"/></svg>'; }
  }
  const ns = document.createElement('div');
  ns.className = 'step-item active';
  ns.dataset.step = step;
  ns.style.animationDelay = '0s';
  ns.innerHTML = `<div class="step-check spinner-mini" id="check${step}"></div><span>${text}</span>`;
  stepList.appendChild(ns);
  scrollToBottom();
}

// ─── Stream text ───
function streamText(el, html, callback) {
  const tokens = [];
  let i = 0;
  while (i < html.length) {
    if (html[i] === '<') {
      const end = html.indexOf('>', i);
      tokens.push({ tag: true, text: html.slice(i, end + 1) });
      i = end + 1;
    } else {
      tokens.push({ tag: false, text: html[i] });
      i++;
    }
  }

  el.innerHTML = '';
  let idx = 0;
  let displayed = '';

  function tick() {
    if (idx >= tokens.length) {
      el.innerHTML = displayed;
      if (callback) setTimeout(callback, 200);
      return;
    }
    const token = tokens[idx];
    if (token.tag) {
      displayed += token.text;
      idx++;
      tick();
    } else {
      displayed += token.text;
      idx++;
      el.innerHTML = displayed + '<span class="cursor-blink"></span>';
      setTimeout(tick, 15 + Math.random() * 25);
    }
    scrollToBottom();
  }
  tick();
}

// ─── Export Spreadsheet (CSV) ───
function exportSpreadsheet() {
  if (!currentResults || currentResults.length === 0) {
    showToast('No results to export');
    return;
  }

  const query = lastSearchQuery || 'repfind';
  const rows = [
    ['Product', 'Seller', 'Platform', 'Price (CNY)', 'Price (USD)', 'Rating', 'Sales', 'Quality', 'CNFans Link (Affiliate)', 'KakoBuy Link', 'OopBuy Link']
  ];

  currentResults.forEach(r => {
    const cnfansLink = buildAgentLink('cnfans', r);
    const kakobuyLink = buildAgentLink('kakobuy', r);
    const oopbuyLink = buildAgentLink('oopbuy', r);
    rows.push([
      r.name,
      r.seller,
      r.platform,
      '¥' + r.priceCNY,
      '$' + r.priceUSD,
      '⭐' + r.rating,
      r.sales.toLocaleString() + ' sold',
      r.quality,
      cnfansLink,
      kakobuyLink,
      oopbuyLink,
    ]);
  });

  // Build CSV
  const csv = rows.map(row =>
    row.map(cell => {
      const s = String(cell);
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"' + s.replace(/"/g, '""') + '"'
        : s;
    }).join(',')
  ).join('\n');

  // Download
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const filename = `repfind-${query.toLowerCase().replace(/[^a-z0-9]/g, '-')}-${Date.now()}.csv`;
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

function searchProducts(query, limit = 12) {
  if (!PRODUCT_DB || PRODUCT_DB.length === 0) return [];
  
  const term = query.toLowerCase().trim();
  if (!term) return [];
  
  const words = term.split(/\s+/).filter(w => w.length > 0);
  
  // ─── Rep keyword synonyms ───
  const SYNONYMS = {
    'af1': ['air force 1', 'air force one'],
    'af 1': ['air force 1', 'air force one'],
    'aj1': ['air jordan 1', 'jordan 1'],
    'aj4': ['air jordan 4', 'jordan 4'],
    'aj11': ['air jordan 11', 'jordan 11'],
    'nb': ['new balance'],
    'fog': ['fear of god'],
    'ts': ['travis scott'],
    'lv': ['louis vuitton'],
    'tee': ['t-shirt', 'tshirt'],
    'dunk lows': ['dunk low'],
    'yeezys': ['yeezy'],
    'js': ['jordan'],
    'ch': ['chrome hearts'],
    'rh': ['rolex'],
    'ow': ['off white', 'off-white'],
    'pk': ['pk god', 'pkbatch'],
    'og': ['og batch'],
  };
  
  // Expand query with synonyms
  const expandedTerms = new Set([term]);
  for (const [key, syns] of Object.entries(SYNONYMS)) {
    if (term === key || words.includes(key)) {
      syns.forEach(s => expandedTerms.add(s));
    }
  }
  const searchTermList = [...expandedTerms];
  
  // ─── Helper: fuzzy word match (handles typos, partial matches) ───
  function fuzzyMatch(text, word) {
    if (text.includes(word)) return 'exact';
    // Prefix match (e.g. "jord" matches "jordan")
    const prefix = word.slice(0, Math.max(3, word.length - 1));
    if (prefix.length >= 3 && text.match(new RegExp('\\b' + prefix))) return 'prefix';
    // Levenshtein-lite for short query words (typos)
    if (word.length >= 4) {
      const threshold = word.length <= 5 ? 1 : 2;
      const wordsInText = text.split(/[^a-z0-9]+/);
      for (const w of wordsInText) {
        if (w.length < 3) continue;
        if (Math.abs(w.length - word.length) > threshold) continue;
        let dist = 0;
        const minLen = Math.min(w.length, word.length);
        for (let i = 0; i < minLen && dist <= threshold; i++) {
          if (w[i] !== word[i]) dist++;
        }
        dist += Math.abs(w.length - word.length);
        if (dist <= threshold) return 'fuzzy';
      }
    }
    return null;
  }
  
  // ─── Scoring ───
  const scored = [];
  for (const p of PRODUCT_DB) {
    const name = (p.name || '').toLowerCase();
    const cat = (p.category || '').toLowerCase();
    const brand = (p._category || p.category || '').toLowerCase();
    
    if (!name) continue;
    
    let score = 0;
    let matchedWords = 0;
    
    // 1. Exact full query phrase in name (highest signal)
    if (name.includes(term)) score += 250;
    
    // 2. Expanded term phrase matches in name
    for (const st of searchTermList) {
      if (st !== term && name.includes(st)) score += 180;
    }
    
    // 3. Name starts with query (very strong signal)
    if (name.startsWith(term)) score += 120;
    
    // 4. Word-by-word matching with fuzzy support across name, brand, category
    for (const w of words) {
      const nameMatch = fuzzyMatch(name, w);
      const brandMatch = fuzzyMatch(brand, w);
      const catMatch = fuzzyMatch(cat, w);
      
      if (nameMatch === 'exact') { score += 50; matchedWords++; }
      else if (nameMatch === 'prefix') { score += 35; matchedWords++; }
      else if (nameMatch === 'fuzzy') { score += 25; matchedWords++; }
      else if (brandMatch === 'exact') { score += 40; matchedWords++; }
      else if (brandMatch === 'prefix') { score += 28; matchedWords++; }
      else if (catMatch === 'exact') { score += 15; matchedWords++; }
      else if (catMatch === 'prefix') { score += 10; matchedWords++; }
    }
    
    // 5. All words matched bonus (CRITICAL — "jordan 4" needs both words)
    if (matchedWords === words.length && words.length > 1) score += 150;
    const missingWords = words.length - matchedWords;
    score -= missingWords * 60;
    
    // 6. Expanded word matches (synonyms)
    for (const st of searchTermList) {
      if (st !== term && !words.some(w => st.includes(w))) {
        const stWords = st.split(/\s+/);
        let stMatch = true;
        for (const sw of stWords) {
          if (!name.includes(sw)) { stMatch = false; break; }
        }
        if (stMatch) score += 60;
      }
    }
    
    // 7. Category match (lower weight)
    for (const w of words) {
      if (cat.includes(w)) score += 8;
    }
    
    // 8. Quality boosts
    if (p.image && !p.image.includes('picsum')) score += 5;
    if (p.clicks > 0) score += Math.min(p.clicks / 100, 20);
    
    // 9. Penalize very long names (keyword-stuffed listings)
    if (name.length > 80) score -= 15;
    
    // 10. Penalize names that are just numbers or gibberish
    if (/^[\d\s\W]+$/.test(name)) score -= 30;
    
    if (score > 0) {
      scored.push({ ...p, score });
    }
  }
  
    // Sort by score (desc), then by name length (asc) for tie-breaker
  scored.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return (a.name || '').length - (b.name || '').length;
  });
  
  // Deduplicate by itemID (keep highest scoring)
  const seen = new Set();
  const results = [];
  for (const p of scored) {
    if (!seen.has(p.itemID)) {
      seen.add(p.itemID);
      results.push(p);
      if (results.length >= limit) break;
    }
  }
  
  return results;
}

function transformProducts(rawProducts) {
  return rawProducts.map((p) => ({
    id: p.itemID,
    name: p.name || 'Unknown Product',
    seller: p.platform ? PLATFORMS[p.platform]?.label || 'Weidian' : 'Weidian',
    platform: p.platform || 'weidian',
    priceCNY: p._priceCNY || '',
    priceUSD: p._priceUSD ? parseFloat(p._priceUSD).toFixed(2) : '',
    img: p.image || '',
    _category: p.category || '',
  }));
}

// ════════════════════════════════════════════════
// AI ANALYSIS ENGINE — Smart verdicts, badges, insights, refinement
// ════════════════════════════════════════════════

let lastAnalysis = null;
let baseResults = [];

function analyzeResults(results) {
  if (!results || results.length === 0) return null;
  const priced = results.filter(r => parseFloat(r.priceUSD) > 0);
  const prices = priced.map(r => parseFloat(r.priceUSD));
  const avgPrice = prices.length > 0 ? prices.reduce((a,b) => a+b, 0) / prices.length : 0;
  const minPrice = prices.length > 0 ? Math.min(...prices) : 0;
  const maxPrice = prices.length > 0 ? Math.max(...prices) : 0;
  let lowestPriceIdx = -1, lowestPrice = Infinity;
  priced.forEach((r) => {
    const price = parseFloat(r.priceUSD);
    if (price > 0 && price < lowestPrice) { lowestPrice = price; lowestPriceIdx = results.indexOf(r); }
  });
  return {
    avgPrice, minPrice, maxPrice, priceSpread: maxPrice - minPrice,
    lowestPriceIdx,
    totalResults: results.length,
    platformCount: new Set(results.map(r => r.platform)).size,
  };
}

function generateSmartVerdict(query, results, a) {
  if (!results || results.length === 0) return { verdict: `No exact matches for <strong>"${escapeHtml(query)}"</strong> in our database of 24,000+ products. Try <strong>Jordan</strong>, <strong>Yeezy</strong>, or <strong>Travis Scott</strong>.`, stats: [], insights: [] };
  if (!a) return { verdict: `Found <strong>${results.length} listings</strong>.`, stats: [], insights: [] };
  const avg = a.avgPrice.toFixed(2), min = a.minPrice.toFixed(2), max = a.maxPrice.toFixed(2);
  let parts = [`Found <strong>${a.totalResults} listings</strong> for "${escapeHtml(query)}"`];
  if (a.priceSpread > 20) parts.push(`Prices range from <strong>$${min}</strong> to <strong>$${max}</strong> — a <strong>$${a.priceSpread.toFixed(0)} spread</strong>`);
  else if (a.avgPrice > 0) parts.push(`Prices cluster around <strong>$${avg}</strong>`);
  const stats = a.avgPrice > 0 ? [
    { label: 'Avg Price', value: `$${avg}`, sub: `¥${Math.round(a.avgPrice * 7.25)}`, class: 'accent' },
    { label: 'Price Range', value: `$${min}–$${max}`, class: '' },
    { label: 'Listings', value: `${a.totalResults}`, class: 'green' },
  ] : [{ label: 'Listings', value: `${a.totalResults}`, class: 'accent' }];
  const insights = [];
  if (a.lowestPriceIdx >= 0 && a.avgPrice > 0) {
    const p = results[a.lowestPriceIdx]; const price = parseFloat(p.priceUSD) || 0;
    const pctBelow = Math.round((1 - price / a.avgPrice) * 100);
    if (pctBelow > 5) insights.push({ type: 'deal', icon: '$', text: `<strong>Lowest price:</strong> ${escapeHtml(p.name)} at $${price.toFixed(2)} — ${pctBelow}% below the $${avg} average.` });
  }
  if (a.priceSpread > 30 && a.totalResults >= 4) insights.push({ type: 'info', icon: 'i', text: `Big price gap ($${min} to $${max}). Higher price doesn't always mean better quality — do your own QC research.` });
  return { verdict: parts.join('. ') + '.', stats, insights };
}

  if (!insights || !insights.length) return '';
  return '<div class="ai-insight">' + insights.map(ins => {
    const cls = ins.type === 'pick' ? 'pick' : ins.type === 'warn' ? 'warn' : ins.type === 'deal' ? 'deal' : 'info';
    return `<div class="insight-row"><span class="insight-icon ${cls}">${ins.icon}</span><span>${ins.text}</span></div>`;
  }).join('') + '</div>';
}

function renderRefinementHint() {
  return `<div class="refinement-hint"><span>Narrow down:</span><span class="refinement-chip" onclick="refineResults('cheaper')">Under avg</span><span class="refinement-chip" onclick="refineResults('expensive')">Premium</span><span class="refinement-chip" onclick="refineResults('cheapest')">Cheapest first</span><span class="refinement-chip" onclick="refineResults('all')">Show all</span></div>`;
}

function refineResults(mode) {
  if (!baseResults.length) return;
  const allLists = document.querySelectorAll('#resultsList');
  const list = allLists[allLists.length - 1];
  if (!list) return;
  let filtered = [...baseResults];
  const avg = lastAnalysis ? lastAnalysis.avgPrice : 0;
  switch(mode) {
    case 'cheaper': filtered = filtered.filter(r => parseFloat(r.priceUSD) > 0 && parseFloat(r.priceUSD) <= avg).sort((a,b) => parseFloat(a.priceUSD) - parseFloat(b.priceUSD)); showToast(`Showing ${filtered.length} under $${avg.toFixed(2)}`); break;
    case 'expensive': filtered = filtered.filter(r => parseFloat(r.priceUSD) > avg).sort((a,b) => parseFloat(b.priceUSD) - parseFloat(a.priceUSD)); showToast(`Premium picks`); break;
    case 'cheapest': filtered.sort((a,b) => parseFloat(a.priceUSD || 9999) - parseFloat(b.priceUSD || 9999)); showToast('Sorted cheapest first'); break;
    default: showToast('Showing all'); break;
  }
  list.innerHTML = '';
  filtered.forEach((r, i) => {
    const origIdx = baseResults.indexOf(r);
    const card = document.createElement('div');
    card.className = 'result-card';
    card.dataset.platform = r.platform;
    card.style.animationDelay = `${Math.min(i * 0.04, 0.3)}s`;
    card.innerHTML = renderCardHTML(r, origIdx);
    list.appendChild(card);
  });
  scrollToBottom();
}

function generateVerdict(query, results) {
  const analysis = analyzeResults(results);
  lastAnalysis = analysis;
  return generateSmartVerdict(query, results, analysis);
}
