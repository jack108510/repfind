<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repfind — find the best reps, fast</title>
  <meta name="description" content="Search across Weidian, Taobao, and 1688. AI verdicts on price, quality, and legitimacy. Send straight to your agent.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #212121;
      --bg-sidebar: #171717;
      --surface: #2F2F2F;
      --surface-hover: #383838;
      --border: #3E3E3E;
      --text: #ECECEC;
      --text-muted: #9B9B9B;
      --text-dim: #6B6B6B;
      --accent: #C84B2F;
      --accent-light: #E8624A;
      --accent-dim: rgba(200, 75, 47, 0.12);
      --green: #4ADE80;
      --yellow: #FACC15;
      --red: #EF4444;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-pill: 100px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* ─── SIDEBAR ─── */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 12px;
      z-index: 100;
      transition: transform var(--transition);
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      margin-bottom: 16px;
    }
    .new-search-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
      width: 100%;
      text-align: left;
    }
    .new-search-btn:hover { background: var(--surface); }
    .sidebar-history {
      flex: 1;
      overflow-y: auto;
      margin-top: 16px;
    }
    .history-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
      padding: 8px;
      margin-bottom: 4px;
    }
    .history-item {
      display: block;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: background var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item:hover { background: var(--surface); color: var(--text); }
    .history-item.active { background: var(--surface); color: var(--text); }
    .sidebar-footer {
      padding: 8px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer-text {
      font-size: 0.75rem;
      color: var(--text-dim);
      padding: 4px 8px;
    }

    /* ─── MAIN ─── */
    .main {
      margin-left: 260px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: margin var(--transition);
    }

    /* ─── TOP BAR (visible after search) ─── */
    .topbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
    }
    .topbar.show { display: flex; }
    .topbar-logo {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }
    .topbar-logo .find { color: var(--accent); }

    /* ─── WELCOME (centered, pre-search) ─── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      transition: opacity 0.3s;
    }
    .welcome.hide {
      display: none;
    }
    .welcome h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .welcome h1 .find { color: var(--accent); }
    .welcome p {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    /* ─── SEARCH BOX (the prompt) ─── */
    .prompt-container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }
    .prompt-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 6px 6px 6px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .prompt-box:focus-within {
      border-color: var(--text-dim);
      box-shadow: 0 0 0 1px var(--text-dim);
    }
    .prompt-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      padding: 12px 0;
    }
    .prompt-box input::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--text);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all var(--transition);
      font-size: 1.1rem;
      font-weight: 700;
    }
    .send-btn:disabled {
      background: var(--border);
      color: var(--text-dim);
      cursor: not-allowed;
    }
    .send-btn:not(:disabled):hover {
      background: var(--accent);
      color: white;
    }

    /* ─── SUGGESTIONS ─── */
    .suggestions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }
    .suggestion {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.83rem;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .suggestion:hover {
      background: var(--surface-hover);
      border-color: var(--text-dim);
      color: var(--text);
    }
    .suggestion-icon { font-size: 1rem; }

    /* ─── CHAT AREA (post-search) ─── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 160px;
      display: none;
    }
    .chat-area.show { display: block; }

    .chat-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ─── USER QUERY BUBBLE ─── */
    .query-bubble {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
      animation: fadeInUp 0.3s ease;
    }
    .query-bubble span {
      background: var(--surface);
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      font-size: 0.9rem;
      font-weight: 500;
      max-width: 80%;
    }

    /* ─── AI RESPONSE ─── */
    .ai-response {
      animation: fadeInUp 0.4s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── TYPING INDICATOR ─── */
    .typing {
      display: flex;
      gap: 4px;
      padding: 16px 0;
    }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: typingBounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── AI VERDICT (chat-style) ─── */
    .verdict-block {
      margin-bottom: 20px;
    }
    .verdict-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .verdict-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }
    .verdict-name {
      font-size: 0.85rem;
      font-weight: 700;
    }
    .verdict-text {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
      padding-left: 36px;
    }
    .verdict-text strong { font-weight: 700; }

    /* ─── STAT PILLS ─── */
    .stat-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-left: 36px;
      margin-top: 14px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .stat-pill .stat-label {
      color: var(--text-dim);
      font-weight: 500;
      font-size: 0.78rem;
    }
    .stat-pill .stat-val.accent { color: var(--accent-light); }
    .stat-pill .stat-val.green { color: var(--green); }
    .stat-pill .stat-val.yellow { color: var(--yellow); }
    .stat-pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
    }

    /* ─── RESULTS ─── */
    .results-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
      padding-left: 36px;
      margin: 28px 0 14px;
    }
    .results-list {
      display: grid;
      gap: 10px;
      padding-left: 36px;
    }
    .result-card {
      display: flex;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      transition: border-color var(--transition), background var(--transition);
      animation: cardIn 0.35s ease backwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-card:hover {
      border-color: var(--text-dim);
      background: var(--surface-hover);
    }
    .result-img {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      background: var(--border);
      flex-shrink: 0;
      object-fit: cover;
    }
    .result-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }
    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .result-info { min-width: 0; }
    .result-name {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .result-seller {
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .result-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    .platform-badge {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }
    .platform-weidian { background: #1A2B3D; color: #6BAED6; }
    .platform-taobao { background: #2D1A1A; color: #E8715A; }
    .platform-1688 { background: #1A231A; color: #6BAA6B; }
    .result-price {
      text-align: right;
      flex-shrink: 0;
    }
    .price-main {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .price-cny {
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .result-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .agent-btn {
      flex: 1;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
    }
    .agent-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .quality {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .quality-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .quality-good .quality-dot { background: var(--green); }
    .quality-ok .quality-dot { background: var(--yellow); }
    .quality-risky .quality-dot { background: var(--red); }
    .quality-good { color: var(--green); }
    .quality-ok { color: var(--yellow); }
    .quality-risky { color: var(--red); }

    /* ─── PLATFORM FILTERS (inline, subtle) ─── */
    .inline-filters {
      display: flex;
      gap: 6px;
      padding-left: 36px;
      margin-bottom: 14px;
    }
    .inline-filter {
      font-size: 0.76rem;
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
    }
    .inline-filter.active {
      background: var(--surface);
      border-color: var(--text-dim);
      color: var(--text);
    }
    .inline-filter:hover:not(.active) {
      color: var(--text);
    }

    /* ─── DOCKED INPUT (bottom, after search) ─── */
    .docked-input {
      position: fixed;
      bottom: 0;
      left: 260px;
      right: 0;
      padding: 16px 24px 20px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      display: none;
      z-index: 50;
    }
    .docked-input.show { display: flex; }
    .docked-input .prompt-box {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ─── DISCLAIMER ─── */
    .disclaimer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      padding: 8px 0 0;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ─── MOBILE ─── */
    .mobile-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .menu-btn {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .sidebar-overlay.show { display: block; }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main { margin-left: 0; }
      .docked-input { left: 0; }
      .mobile-header { display: flex; }
      .welcome h1 { font-size: 1.6rem; }
      .prompt-container { max-width: calc(100% - 32px); }
      .results-list, .inline-filters, .verdict-text, .stat-pills, .results-label {
        padding-left: 0;
      }
      .result-card { flex-direction: row; }
      .result-img { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>

<!-- ─── SIDEBAR ─── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="/" class="logo" style="font-size:1.2rem;font-weight:900;letter-spacing:-0.03em;">
      rep<span style="color:var(--accent)">find</span>
    </a>
  </div>
  <button class="new-search-btn" onclick="newSearch()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    New search
  </button>
  <div class="sidebar-history" id="historyList">
    <div class="history-label">Recent</div>
  </div>
  <div class="sidebar-footer">
    <div class="sidebar-footer-text">The discovery layer for reps</div>
  </div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ─── MAIN ─── -->
<div class="main">
  <!-- Mobile header -->
  <div class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <span class="topbar-logo">rep<span class="find" style="color:var(--accent)">find</span></span>
    <div style="width:28px"></div>
  </div>

  <!-- Top bar (post-search) -->
  <div class="topbar" id="topbar">
    <span class="topbar-logo">rep<span class="find">find</span></span>
    <div style="display:flex;gap:16px">
      <a href="#" style="font-size:0.8rem;color:var(--text-muted)" onclick="alert('Coming soon')">Agents</a>
    </div>
  </div>

  <!-- Welcome (centered) -->
  <div class="welcome" id="welcome">
    <h1>rep<span class="find">find</span></h1>
    <p>Find reps across Weidian, Taobao &amp; 1688. AI verdicts on price and legitimacy.</p>
    <div class="prompt-container">
      <div class="prompt-box">
        <input type="text" id="searchInput" placeholder="Search for any rep — e.g. Travis Scott AF1...">
        <button class="send-btn" id="sendBtn" onclick="doSearch()" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="suggestions">
        <div class="suggestion" onclick="quickSearch('Travis Scott AF1')"><span class="suggestion-icon">👟</span> Travis Scott AF1</div>
        <div class="suggestion" onclick="quickSearch('Lululemon Define Jacket')"><span class="suggestion-icon">🧥</span> Lululemon Define</div>
        <div class="suggestion" onclick="quickSearch('New Balance 9060')"><span class="suggestion-icon">👟</span> NB 9060</div>
        <div class="suggestion" onclick="quickSearch('Oakley OTT')"><span class="suggestion-icon">🕶️</span> Oakley OTT</div>
      </div>
    </div>
  </div>

  <!-- Chat area (post-search) -->
  <div class="chat-area" id="chatArea">
    <div class="chat-inner" id="chatInner">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Docked input (post-search, bottom) -->
  <div class="docked-input" id="dockedInput">
    <div style="width:100%">
      <div class="prompt-box">
        <input type="text" id="dockedSearchInput" placeholder="Search another rep...">
        <button class="send-btn" id="dockedSendBtn" onclick="doSearch(true)" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="disclaimer">repfind is a discovery tool. Not affiliated with any agent or platform.</div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// repfind — ChatGPT-style
// ════════════════════════════════════════════════

const AGENTS = {
  kakobuy: { name: 'KakoBuy' },
  cnfans:  { name: 'CNFans' },
  oopbuy:  { name: 'Oopbuy' },
};

const PLATFORMS = {
  weidian: { label: 'Weidian', class: 'platform-weidian' },
  taobao:  { label: 'Taobao',  class: 'platform-taobao' },
  '1688':  { label: '1688',    class: 'platform-1688' },
};

let searchHistory = [];
let currentPlatform = 'all';

// ─── Input enable/disable ───
const mainInput = document.getElementById('searchInput');
const mainSend = document.getElementById('sendBtn');
const dockedInput = document.getElementById('dockedSearchInput');
const dockedSend = document.getElementById('dockedSendBtn');

mainInput.addEventListener('input', () => {
  mainSend.disabled = !mainInput.value.trim();
});
dockedInput.addEventListener('input', () => {
  dockedSend.disabled = !dockedInput.value.trim();
});
mainInput.addEventListener('keydown', e => { if (e.key === 'Enter' && mainInput.value.trim()) doSearch(); });
dockedInput.addEventListener('keydown', e => { if (e.key === 'Enter' && dockedInput.value.trim()) doSearch(true); });

// ─── Sidebar toggle (mobile) ───
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

// ─── New search (reset to welcome) ───
function newSearch() {
  document.getElementById('welcome').classList.remove('hide');
  document.getElementById('chatArea').classList.remove('show');
  document.getElementById('dockedInput').classList.remove('show');
  document.getElementById('topbar').classList.remove('show');
  mainInput.value = '';
  mainInput.focus();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

// ─── Search entry points ───
function quickSearch(query) {
  mainInput.value = query;
  doSearch();
}
function getQuery() {
  if (dockedInput.value.trim()) return dockedInput.value.trim();
  return mainInput.value.trim();
}

// ─── Main search flow ───
function doSearch(fromDocked = false) {
  const query = getQuery();
  if (!query) return;

  // Transition: welcome → chat
  document.getElementById('welcome').classList.add('hide');
  document.getElementById('chatArea').classList.add('show');
  document.getElementById('dockedInput').classList.add('show');
  document.getElementById('topbar').classList.add('show');

  // Clear previous
  const inner = document.getElementById('chatInner');
  inner.innerHTML = '';

  // Add user query bubble
  const userBubble = document.createElement('div');
  userBubble.className = 'query-bubble';
  userBubble.innerHTML = `<span>${escapeHtml(query)}</span>`;
  inner.appendChild(userBubble);

  // Add typing indicator
  const typing = document.createElement('div');
  typing.className = 'ai-response';
  typing.id = 'typingIndicator';
  typing.innerHTML = `
    <div class="verdict-header">
      <div class="verdict-avatar">r</div>
      <span class="verdict-name">repfind</span>
    </div>
    <div class="typing" style="padding-left:36px"><span></span><span></span><span></span></div>
  `;
  inner.appendChild(typing);

  // Scroll to bottom
  scrollToBottom();

  // Clear inputs
  dockedInput.value = '';
  mainInput.value = '';
  mainSend.disabled = true;
  dockedSend.disabled = true;

  // Simulate API delay then render
  setTimeout(() => {
    document.getElementById('typingIndicator').remove();
    renderResponse(query, inner);
    // Add to history
    addHistory(query);
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }, 900 + Math.random() * 400);
}

// ─── Render AI response ───
function renderResponse(query, container) {
  const results = generateResults(query);
  const verdict = generateVerdict(query, results);

  const responseDiv = document.createElement('div');
  responseDiv.className = 'ai-response';
  responseDiv.id = 'aiResponse';

  // Verdict text (streamed)
  const verdictHTML = `
    <div class="verdict-header">
      <div class="verdict-avatar">r</div>
      <span class="verdict-name">repfind</span>
    </div>
    <div class="verdict-text" id="verdictText"></div>
    <div class="stat-pills" id="statPills"></div>
    <div class="inline-filters" id="inlineFilters">
      <button class="inline-filter active" data-platform="all">All</button>
      <button class="inline-filter" data-platform="weidian">Weidian</button>
      <button class="inline-filter" data-platform="taobao">Taobao</button>
      <button class="inline-filter" data-platform="1688">1688</button>
    </div>
    <div class="results-label">${results.length} results</div>
    <div class="results-list" id="resultsList"></div>
  `;
  responseDiv.innerHTML = verdictHTML;
  container.appendChild(responseDiv);

  // Stream verdict text
  streamText(document.getElementById('verdictText'), verdict.verdict, () => {
    // After text done, show stats
    showStats(verdict.stats);
    // Then stagger results
    renderResults(results);
    // Wire filters
    wireFilters();
  });

  scrollToBottom();
}

// ─── Stream text (typewriter effect) ───
function streamText(el, html, callback) {
  // Parse HTML into tokens (tags + chars)
  const tokens = [];
  let i = 0;
  while (i < html.length) {
    if (html[i] === '<') {
      const end = html.indexOf('>', i);
      tokens.push({ tag: true, text: html.slice(i, end + 1) });
      i = end + 1;
    } else {
      tokens.push({ tag: false, text: html[i] });
      i++;
    }
  }

  el.innerHTML = '';
  let idx = 0;
  let displayed = '';

  function tick() {
    if (idx >= tokens.length) {
      el.innerHTML = displayed;
      if (callback) setTimeout(callback, 200);
      return;
    }
    const token = tokens[idx];
    if (token.tag) {
      displayed += token.text;
      idx++;
      tick();
    } else {
      displayed += token.text;
      idx++;
      el.innerHTML = displayed + '<span style="opacity:0.5;animation:blink 0.8s infinite">▋</span>';
      // Add blink keyframe if not present
      if (!document.getElementById('blinkStyle')) {
        const s = document.createElement('style');
        s.id = 'blinkStyle';
        s.textContent = '@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}';
        document.head.appendChild(s);
      }
      setTimeout(tick, 12 + Math.random() * 20);
    }
    scrollToBottom();
  }
  tick();
}

// ─── Show stat pills ───
function showStats(stats) {
  const el = document.getElementById('statPills');
  if (!el) return;
  el.innerHTML = stats.map((s, i) => {
    const dotClass = s.class === 'green' ? 'background:var(--green)' :
                     s.class === 'yellow' ? 'background:var(--yellow)' :
                     s.class === 'accent' ? 'background:var(--accent)' : '';
    return `<div class="stat-pill" style="animation:cardIn 0.3s ease backwards;animation-delay:${i*0.1}s">
      <div class="dot" style="${dotClass}"></div>
      <span class="stat-label">${s.label}</span>
      <span class="stat-val ${s.class}">${s.value}</span>
      ${s.sub ? `<span style="color:var(--text-dim);font-size:0.72rem">${s.sub}</span>` : ''}
    </div>`;
  }).join('');
}

// ─── Render result cards ───
function renderResults(results) {
  const list = document.getElementById('resultsList');
  if (!list) return;
  list.innerHTML = '';
  results.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.dataset.platform = r.platform;
    card.style.animationDelay = `${i * 0.08}s`;
    card.innerHTML = renderCardHTML(r);
    list.appendChild(card);
  });
  scrollToBottom();
}

function renderCardHTML(r) {
  const qualityClass = r.quality === 'good' ? 'quality-good' :
                       r.quality === 'ok'   ? 'quality-ok'   : 'quality-risky';
  const qualityLabel = r.quality === 'good' ? 'Legit' :
                       r.quality === 'ok'   ? 'OK' : 'Risky';
  const plat = PLATFORMS[r.platform];
  const agentBtns = Object.entries(AGENTS).map(([key, agent]) =>
    `<button class="agent-btn" onclick="sendToAgent('${key}', '${r.id}', this)">${agent.name}</button>`
  ).join('');

  return `
    <img class="result-img" src="${r.img}" alt="${escapeAttr(r.name)}" loading="lazy"
         onerror="this.style.opacity=0">
    <div class="result-body">
      <div class="result-top">
        <div class="result-info">
          <div class="result-name">${escapeHtml(r.name)}</div>
          <div class="result-seller">${escapeHtml(r.seller)} · ⭐ ${r.rating} · ${r.sales.toLocaleString()} sold</div>
          <div class="result-meta">
            <span class="platform-badge ${plat.class}">${plat.label}</span>
            <span class="quality ${qualityClass}"><span class="quality-dot"></span>${qualityLabel}</span>
          </div>
        </div>
        <div class="result-price">
          <div class="price-main">¥${r.priceCNY}</div>
          <div class="price-cny">$${r.priceUSD}</div>
        </div>
      </div>
      <div class="result-actions">${agentBtns}</div>
    </div>
  `;
}

// ─── Send to agent ───
function sendToAgent(agentKey, resultId, btn) {
  const original = btn.textContent;
  btn.textContent = 'Opening...';
  btn.style.background = 'var(--accent)';
  btn.style.borderColor = 'var(--accent)';
  btn.style.color = 'white';
  setTimeout(() => {
    btn.textContent = '✓ Copied';
    setTimeout(() => {
      btn.textContent = original;
      btn.style.cssText = '';
    }, 1400);
  }, 500);
}

// ─── Platform filters ───
function wireFilters() {
  document.querySelectorAll('.inline-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.inline-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPlatform = btn.dataset.platform;
      applyFilter(currentPlatform);
    });
  });
}
function applyFilter(platform) {
  document.querySelectorAll('.result-card').forEach(card => {
    card.style.display = (platform === 'all' || card.dataset.platform === platform) ? '' : 'none';
  });
}

// ─── History ───
function addHistory(query) {
  if (searchHistory[0] === query) return;
  searchHistory = [query, ...searchHistory.filter(q => q !== query)].slice(0, 12);
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  el.innerHTML = '<div class="history-label">Recent</div>';
  searchHistory.forEach(q => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.textContent = q;
    item.onclick = () => { mainInput.value = q; doSearch(); };
    el.appendChild(item);
  });
}

// ─── Utils ───
function scrollToBottom() {
  const area = document.getElementById('chatArea');
  if (area) area.scrollTop = area.scrollHeight;
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return escapeHtml(str).replace(/"/g, '&quot;');
}

// ════════════════════════════════════════════════
// Mock data (same as before)
// ════════════════════════════════════════════════
function generateResults(query) {
  const seed = query.toLowerCase();
  const basePrice = 50 + (seed.length % 10) * 8;
  const sellers = [
    { name: 'TopLux Store', rating: 4.8, sales: 3200, rep: 'good', platform: 'weidian' },
    { name: 'Factory Direct 厂家直销', rating: 4.6, sales: 1800, rep: 'good', platform: 'weidian' },
    { name: 'Fashion Hub 潮流馆', rating: 4.3, sales: 950, rep: 'ok', platform: 'taobao' },
    { name: 'Bargain Deals 88', rating: 3.9, sales: 450, rep: 'risky', platform: 'taobao' },
    { name: 'Wholesale Supply 鹏程', rating: 4.5, sales: 5200, rep: 'good', platform: '1688' },
    { name: 'QuickShip Store', rating: 4.1, sales: 680, rep: 'ok', platform: 'weidian' },
  ];
  return sellers.map((s, i) => {
    const variance = 0.7 + (i * 0.12) + (Math.sin(seed.length + i) * 0.1);
    const priceCNY = Math.round((basePrice * variance) / 5) * 5;
    const priceUSD = (priceCNY / 7.25).toFixed(2);
    return {
      id: `${s.platform}-${i}-${Date.now()}`,
      name: `${query.charAt(0).toUpperCase() + query.slice(1)} — Batch ${['A','B','C','D','E','F'][i]}`,
      seller: s.name,
      rating: s.rating,
      sales: s.sales,
      platform: s.platform,
      priceCNY, priceUSD,
      quality: s.rep,
      img: `https://picsum.photos/seed/${encodeURIComponent(seed + i)}/100/100`,
    };
  });
}

function generateVerdict(query, results) {
  const prices = results.map(r => r.priceCNY);
  const avg = Math.round(prices.reduce((a,b) => a+b, 0) / prices.length);
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const goodCount = results.filter(r => r.quality === 'good').length;
  const okCount = results.filter(r => r.quality === 'ok').length;
  const riskyCount = results.filter(r => r.quality === 'risky').length;

  let verdict, confidence;
  if (goodCount >= 3) {
    verdict = `<strong>${goodCount} sellers</strong> look legit with solid ratings and real sales volume. The market for "${escapeHtml(query)}" is healthy — plenty of options.`;
    confidence = 'high';
  } else if (goodCount >= 1) {
    verdict = `Mixed bag. <strong>${goodCount} sellers</strong> look trustworthy, ${okCount + riskyCount} are questionable. Stick to the green-rated ones below.`;
    confidence = 'medium';
  } else {
    verdict = `Most results for "${escapeHtml(query)}" look risky. Low sales, poor ratings. Proceed with caution — check QC pics before committing.`;
    confidence = 'low';
  }

  const avgUSD = (avg / 7.25).toFixed(2);
  return {
    verdict,
    stats: [
      { label: 'Avg Price', value: `¥${avg}`, sub: `$${avgUSD}`, class: 'accent' },
      { label: 'Range', value: `¥${min}–${max}`, class: '' },
      { label: 'Legit', value: `${goodCount}/${results.length}`, class: goodCount >= 3 ? 'green' : goodCount >= 1 ? 'yellow' : '' },
    ],
  };
}
